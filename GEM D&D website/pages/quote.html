<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get a Free Quote - KBR Business Solutions</title>
  <meta name="description" content="Request a tailored quote for your business from KBR." />
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/tailwind-config.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="../js/dark-mode.js"></script>
  <script src="../js/scroll-to-top.js"></script>
</head>
<body class="bg-gray-50 dark:bg-background font-body min-h-screen flex flex-col transition-colors">

  <!-- Header -->
  <header class="flex items-center justify-between px-8 py-4 bg-white dark:bg-[#1a1a1a] border-b border-gray-100 dark:border-gray-800 shadow-sm sticky top-0 z-10 transition-colors">
    <div class="flex items-center gap-2">
      <img src="../assets/logo.png" alt="KBR Logo" class="h-14 w-auto object-contain dark:hidden">
      <img src="../assets/logo2.png" alt="KBR Logo" class="h-14 w-auto object-contain hidden dark:block">
    </div>
    
    <div class="flex items-center gap-3">
      <button id="theme-toggle" type="button" class="p-2 rounded-lg text-gray-500 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-700 focus:outline-none transition-colors" aria-label="Toggle Dark Mode">
      </button>
      <a href="../index.html" class="text-xs font-medium text-foreground dark:text-gray-300 hover:text-primary dark:hover:text-primary px-4 py-1.5 border border-gray-200 dark:border-gray-700 rounded shadow-sm bg-white dark:bg-gray-800 transition-colors">Back</a>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col justify-center">
    <!-- Title Section -->
    <section class="pt-16 pb-8 px-8 max-w-2xl mx-auto text-center">
      <h1 class="font-heading text-4xl md:text-5xl font-bold mb-4">Get a Free Quote</h1>
      <p class="text-muted-foreground text-sm leading-relaxed max-w-lg mx-auto">
        Tell us about your business and we'll provide a tailored quote. Your request will be sent directly to our team.
      </p>
    </section>

    <!-- Form Section -->
    <section class="max-w-2xl w-full mx-auto px-8 pb-24">
      <div class="bg-white dark:bg-card border border-gray-100 dark:border-gray-800 rounded-xl p-8 shadow-[0_2px_15px_rgba(0,0,0,0.05)] transition-colors">
        <form class="space-y-4">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input type="text" placeholder="Full Name *" class="w-full bg-gray-50/50 dark:bg-background border border-gray-200 dark:border-gray-700 rounded-md px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all dark:text-gray-100 placeholder:text-gray-400 dark:placeholder:text-gray-500" required>
            <input type="email" placeholder="Email Address *" class="w-full bg-gray-50/50 dark:bg-background border border-gray-200 dark:border-gray-700 rounded-md px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all dark:text-gray-100 placeholder:text-gray-400 dark:placeholder:text-gray-500" required>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input type="tel" placeholder="Phone Number" class="w-full bg-gray-50/50 dark:bg-background border border-gray-200 dark:border-gray-700 rounded-md px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all dark:text-gray-100 placeholder:text-gray-400 dark:placeholder:text-gray-500">
            <input type="text" placeholder="Company Name" class="w-full bg-gray-50/50 dark:bg-background border border-gray-200 dark:border-gray-700 rounded-md px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all dark:text-gray-100 placeholder:text-gray-400 dark:placeholder:text-gray-500">
          </div>
          <div class="relative">
            <select class="w-full bg-white dark:bg-background border border-gray-200 dark:border-gray-700 rounded-md px-4 py-3 text-sm appearance-none focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-gray-700 dark:text-gray-100" required>
              <option value="" disabled selected class="dark:text-gray-500">Select Service *</option>
              <option value="bookkeeping">Bookkeeping</option>
              <option value="tax">Tax & VAT Filing</option>
              <option value="payroll">Payroll Management</option>
              <option value="reporting">Financial Reporting</option>
              <option value="registration">Company Registration</option>
              <option value="full">Full Package</option>
            </select>
            <div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-gray-500 dark:text-gray-400">
              <i data-lucide="chevron-down" class="w-4 h-4"></i>
            </div>
          </div>
          <div>
            <textarea placeholder="Tell us more about your needs..." rows="5" class="w-full bg-gray-50/50 dark:bg-background border border-gray-200 dark:border-gray-700 rounded-md px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all resize-y dark:text-gray-100 placeholder:text-gray-400 dark:placeholder:text-gray-500"></textarea>
          </div>
          
          <div class="pt-2">
            <button type="submit" class="w-full bg-primary text-primary-foreground font-semibold py-3.5 rounded-md hover:bg-primary/90 transition-colors text-sm shadow-sm">
              Submit Quote Request
            </button>
          </div>
          <p class="text-center text-xs text-gray-400 mt-4 font-medium">
            Your request will be emailed to <span class="text-gray-500">info@kbr.co.za</span>
          </p>
        </form>
      </div>
    </section>
  </main>

  <script>lucide.createIcons();</script>
</body>
</html>
