<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — KBR</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/tailwind-config.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/billing-store.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/dark-mode.js"></script>
  <script src="../js/scroll-to-top.js"></script>
</head>
<body class="transition-colors">
<script>
  const session = requireAuth(["client"]);
  if (session) {
    initBillingStore();
    const invoices = getInvoices();
    const purchasedCount = getPurchasedCourses().length;

    // Calculate dynamic billing details
    const clientInvoices = invoices.filter(i => i.company === session.name);
    const clientOutstanding = clientInvoices
      .filter(i => i.status === "unpaid")
      .reduce((sum, i) => sum + i.amount, 0);
    const unpaidCount = clientInvoices.filter(i => i.status === "unpaid").length;

    // Calculate dynamic projects count
    const allProjects = JSON.parse(localStorage.getItem('kbr_projects')) || [];
    const clientProjectsCount = allProjects.filter(p => p.client === session.name).length;

    // Calculate dynamic next appointment details
    let allAppointments = JSON.parse(localStorage.getItem('kbr_appointments')) || [];
    let clientAppointments = allAppointments.filter(a => a.client === session.name);
    let nextApptText = "No appointments";
    if (clientAppointments.length > 0) {
      // Find the next/latest scheduled appointment
      const nextAppt = clientAppointments[0];
      const rawDate = nextAppt.date;
      const match = rawDate.match(/^(\d{4})-(\d{2})-(\d{2}) at (\d{2}:\d{2})/);
      if (match) {
        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        const mIndex = parseInt(match[2]) - 1;
        const day = parseInt(match[3]);
        nextApptText = `${months[mIndex]} ${day} at ${match[4]}`;
      } else {
        nextApptText = rawDate.replace("2026-", "");
      }
    }

    function fmt(n) { return n.toLocaleString(); }

    const content = `
      <div class="px-6 py-6 max-w-5xl mx-auto space-y-6">
        <div>
          <h2 class="font-heading text-2xl font-bold text-foreground">Client Dashboard</h2>
          <p class="text-muted-foreground text-sm mt-1">Welcome back. Here is your account overview.</p>
        </div>
        <div class="bg-primary/5 border border-primary/20 rounded-xl p-4 flex items-center gap-4">
          <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center">
            <i data-lucide="check-circle" class="w-5 h-5 text-primary"></i>
          </div>
          <div class="flex-1">
            <div class="font-bold">Account Status</div>
            <div class="text-sm text-muted-foreground">Your account is active. All services are available.</div>
          </div>
          <span class="bg-primary text-primary-foreground text-xs font-bold px-3 py-1 rounded-full">Active</span>
        </div>
        
        <div class="space-y-3">
          <a href="client-billing.html" class="block bg-card border border-border rounded-xl p-5 hover:border-primary/50 transition-colors">
            <div class="flex items-center justify-between mb-2">
              <span class="text-sm text-muted-foreground">Outstanding Balance</span>
              <i data-lucide="credit-card" class="w-5 h-5 text-primary"></i>
            </div>
            <div class="font-heading text-2xl font-bold">R${fmt(clientOutstanding)}</div>
            <div class="text-sm text-muted-foreground mt-0.5">${unpaidCount} unpaid invoice${unpaidCount === 1 ? '' : 's'}</div>
            <div class="text-sm text-primary mt-2">View invoices →</div>
          </a>

          <a href="client-projects.html" class="block bg-card border border-border rounded-xl p-5 hover:border-primary/50 transition-colors">
            <div class="flex items-center justify-between mb-2">
              <span class="text-sm text-muted-foreground">Your Projects</span>
              <i data-lucide="folder-open" class="w-5 h-5 text-primary"></i>
            </div>
            <div class="font-heading text-2xl font-bold">${clientProjectsCount}</div>
            <div class="text-sm text-muted-foreground mt-0.5">Active client workspace trackers</div>
            <div class="text-sm text-primary mt-2">View projects →</div>
          </a>

          <a href="client-calendar.html" class="block bg-card border border-border rounded-xl p-5 hover:border-primary/50 transition-colors">
            <div class="flex items-center justify-between mb-2">
              <span class="text-sm text-muted-foreground">Next Appointment</span>
              <i data-lucide="calendar" class="w-5 h-5 text-primary"></i>
            </div>
            <div class="font-heading text-2xl font-bold truncate">${nextApptText}</div>
            <div class="text-sm text-muted-foreground mt-0.5">Scheduled review sessions</div>
            <div class="text-sm text-primary mt-2">View calendar →</div>
          </a>

          <a href="training.html" class="block bg-card border border-border rounded-xl p-5 hover:border-primary/50 transition-colors">
            <div class="flex items-center justify-between mb-2">
              <span class="text-sm text-muted-foreground">Training & Courses</span>
              <i data-lucide="graduation-cap" class="w-5 h-5 text-primary"></i>
            </div>
            <div class="font-heading text-2xl font-bold">${purchasedCount > 0 ? purchasedCount + ' Unlocked' : 'Explore'} Course${purchasedCount === 1 ? '' : 's'}</div>
            <div class="text-sm text-muted-foreground mt-0.5">SMEs business development modules</div>
            <div class="text-sm text-primary mt-2">Access training portal →</div>
          </a>
        </div>
      </div>
    `;

    renderAppLayout({ title: "Dashboard", current: "client-dashboard.html", contentHTML: content, session });
  }
</script>
</body>
</html>
