<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar — KBR</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/tailwind-config.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/billing-store.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/dark-mode.js"></script>
  <script src="../js/scroll-to-top.js"></script>
</head>
<body class="transition-colors">
<script>
  const session = requireAuth(["admin","employee","client"]);
  if (session) {
    if (session.role === "client") {
      window.location.href = "client-calendar.html";
    }

    // --- Core data initialization ---
    let allAppointments = JSON.parse(localStorage.getItem('kbr_appointments'));
    if (!allAppointments) {
      allAppointments = [
        {title:"Tax Review - Smith Co.", date:"2026-03-05 at 10:00", with:"Sipho Ndlovu", client:"Smith Co.", status:"confirmed"},
        {title:"Payroll Setup - Apex Ltd", date:"2026-03-12 at 14:00", with:"Lindiwe Dlamini", client:"Apex Ltd", status:"pending"},
        {title:"VAT Filing - Green & Sons", date:"2026-03-18 at 09:30", with:"Sipho Ndlovu", client:"Green & Sons", status:"confirmed"},
        {title:"Quarterly Review - TechStart", date:"2026-03-22 at 11:00", with:"Thandi Mokoena", client:"TechStart", status:"pending"},
        {title:"Bookkeeping - M. Johnson", date:"2026-03-25 at 15:00", with:"David van der Merwe", client:"M. Johnson", status:"confirmed"},
      ];
      localStorage.setItem('kbr_appointments', JSON.stringify(allAppointments));
    }

    const DEFAULT_TASKS = [
      {id: 1, text:"Complete Q1 VAT return for Apex Ltd", assigned:"Thandi Mokoena", priority:"high"},
      {id: 2, text:"Send payroll summary to Green & Sons", assigned:"Lindiwe Dlamini", priority:"medium"},
      {id: 3, text:"Reconcile bank statements - Smith Co", assigned:"David van der Merwe", priority:"high"},
      {id: 4, text:"Prepare management report - TechStart", assigned:"Kabelo Rammutla", priority:"low"},
      {id: 5, text:"Follow up on outstanding invoice #1042", assigned:"Nomsa Khumalo", priority:"medium"},
    ];
    let allTasks = JSON.parse(localStorage.getItem('kbr_employee_tasks'));
    if (!allTasks) {
      allTasks = DEFAULT_TASKS;
      localStorage.setItem('kbr_employee_tasks', JSON.stringify(allTasks));
    }

    const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    const servicesList = [
      "Bookkeeping",
      "Tax & VAT Filing",
      "Payroll Management",
      "Financial Reporting",
      "Company Registration",
      "Full Package"
    ];
    const employeesList = [
      "Kabelo Rammutla",
      "Thandi Mokoena",
      "Sipho Ndlovu",
      "Lindiwe Dlamini",
      "David van der Merwe",
      "Nomsa Khumalo"
    ];

    let currentDate = new Date(2026, 2, 1); // March 2026

    function getServiceGroup(title) {
      const t = title.toLowerCase();
      if (t.includes("bookkeeping")) return "Bookkeeping";
      if (t.includes("tax") || t.includes("vat") || t.includes("filing")) return "Tax & VAT Filing";
      if (t.includes("payroll")) return "Payroll Management";
      if (t.includes("financial") || t.includes("review") || t.includes("report")) return "Financial Reporting";
      if (t.includes("registration") || t.includes("company")) return "Company Registration";
      return "Full Package";
    }

    function getEmployeeTaskCount(emp) {
      const tasks = JSON.parse(localStorage.getItem('kbr_employee_tasks')) || [];
      return tasks.filter(t => t.assigned === emp).length;
    }

    function getAppointmentsForRole() {
      let all = JSON.parse(localStorage.getItem('kbr_appointments')) || [];
      let updated = false;
      all.forEach((a, index) => {
        if (!a.id) {
          a.id = `appt-${Date.now()}-${index}-${Math.floor(Math.random()*1000)}`;
          updated = true;
        }
      });
      if (updated) {
        localStorage.setItem('kbr_appointments', JSON.stringify(all));
      }
      return all;
    }

    // --- Dynamic Content Generation ---
    let content = "";
    if (session.role === "admin") {
      // ADMIN: Appointment Task Overview Columns
      content = `
        <div class="px-6 py-6 max-w-7xl mx-auto space-y-6">
          <div>
            <h2 class="font-heading text-2xl font-bold text-foreground">Appointment Task Overview</h2>
            <p class="text-muted-foreground text-sm mt-1">Oversee employee workloads, client appointments, and tasks.</p>
          </div>
          
          <div class="bg-card border border-border rounded-xl p-5 space-y-4">
            <h3 class="font-heading font-bold text-lg text-foreground">Appointments by Service</h3>
            <div id="services-grid" class="flex gap-4 overflow-x-auto pb-2">
              <!-- Rendered dynamically -->
            </div>
          </div>

          <div class="bg-card border border-border rounded-xl p-5 space-y-6">
            <div class="flex items-center justify-between">
              <div>
                <h3 class="font-heading font-bold text-xl">Tasks</h3>
                <p class="text-xs text-muted-foreground mt-0.5">Oversee employee tasks and assignments.</p>
              </div>
              <button id="add-task-btn" class="bg-primary hover:opacity-90 text-primary-foreground text-xs font-semibold py-1.5 px-3 rounded-lg flex items-center gap-1 transition-all">
                <i data-lucide="plus" class="w-3.5 h-3.5"></i> Add Task
              </button>
            </div>

            <!-- Create Task Form -->
            <div id="create-task-form" class="hidden bg-muted/30 border border-border rounded-xl p-4 space-y-3">
              <h4 class="font-bold text-xs text-foreground">Create New Task</h4>
              <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                <div>
                  <label class="text-[10px] font-bold text-muted-foreground block mb-1">Task Description</label>
                  <input type="text" id="new-task-text" placeholder="e.g. File Q1 VAT Return" class="w-full border border-border bg-background rounded-lg px-3 py-1.5 text-xs focus:ring-1 focus:ring-primary focus:outline-none text-foreground" />
                </div>
                <div>
                  <label class="text-[10px] font-bold text-muted-foreground block mb-1">Assign Employee</label>
                  <select id="new-task-assignee" class="w-full border border-border bg-background rounded-lg px-3 py-1.5 text-xs focus:ring-1 focus:ring-primary focus:outline-none text-foreground">
                    <!-- Loaded dynamically -->
                  </select>
                </div>
                <div>
                  <label class="text-[10px] font-bold text-muted-foreground block mb-1">Priority</label>
                  <select id="new-task-priority" class="w-full border border-border bg-background rounded-lg px-3 py-1.5 text-xs focus:ring-1 focus:ring-primary focus:outline-none text-foreground">
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                  </select>
                </div>
              </div>
              <div class="flex gap-2 justify-end pt-1">
                <button id="cancel-task-btn" class="border border-border hover:bg-muted text-xs py-1 px-3 rounded-lg font-medium text-foreground">Cancel</button>
                <button id="save-task-btn" class="bg-primary hover:opacity-90 text-primary-foreground text-xs py-1 px-3 rounded-lg font-semibold">Create Task</button>
              </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
              <div class="lg:col-span-2 space-y-3" id="tasks-list-container">
                <!-- Rendered dynamically -->
              </div>
              
              <div class="bg-muted/10 border border-border/80 rounded-xl p-4 space-y-3 h-fit">
                <h4 class="font-bold text-xs text-foreground pb-2 border-b border-border/50">Employee Task Counts</h4>
                <div class="space-y-2" id="employee-summary-container">
                  <!-- Rendered dynamically -->
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    } else {
      // EMPLOYEE: Month-grid calendar and read-only list
      content = `
        <div class="px-6 py-6 max-w-5xl mx-auto space-y-6">
          <div>
            <h2 class="font-heading text-2xl font-bold text-foreground">Calendar</h2>
            <p class="text-muted-foreground text-sm mt-1">Manage your appointments and scheduled tasks.</p>
          </div>
          
          <div class="bg-card border border-border rounded-xl p-5">
            <div class="flex items-center justify-between mb-4">
              <h3 id="month-title" class="font-heading font-bold text-xl"></h3>
              <div class="flex gap-2">
                <button id="prev-month" class="text-muted-foreground hover:text-foreground w-8 h-8 flex items-center justify-center rounded-lg hover:bg-muted border border-border">&lt;</button>
                <button id="next-month" class="text-muted-foreground hover:text-foreground w-8 h-8 flex items-center justify-center rounded-lg hover:bg-muted border border-border">&gt;</button>
              </div>
            </div>
            <div class="grid grid-cols-7 text-center text-sm mb-2">
              <div class="font-semibold text-muted-foreground py-2">Sun</div>
              <div class="font-semibold text-muted-foreground py-2">Mon</div>
              <div class="font-semibold text-muted-foreground py-2">Tue</div>
              <div class="font-semibold text-muted-foreground py-2">Wed</div>
              <div class="font-semibold text-muted-foreground py-2">Thu</div>
              <div class="font-semibold text-muted-foreground py-2">Fri</div>
              <div class="font-semibold text-muted-foreground py-2">Sat</div>
            </div>
            <div id="cal-grid" class="grid grid-cols-7 text-center text-sm gap-y-2"></div>
          </div>

          <div class="bg-card border border-border rounded-xl p-5">
            <h3 class="font-heading font-bold text-xl mb-4">All Appointments</h3>
            <div id="appt-list" class="space-y-4"></div>
          </div>
        </div>
      `;
    }

    renderAppLayout({ title: session.role === "admin" ? "Overview" : "Calendar", current: "calendar.html", contentHTML: content, session });

    // --- Admin-specific JavaScript logic ---
    if (session.role === "admin") {
      function approveAppointment(apptId) {
        const allAppts = JSON.parse(localStorage.getItem('kbr_appointments')) || [];
        const updated = allAppts.map(a => {
          if (a.id === apptId) return { ...a, status: 'confirmed' };
          return a;
        });
        localStorage.setItem('kbr_appointments', JSON.stringify(updated));
        renderAppointments();
      }

      function deleteAppointment(apptId) {
        showConfirmModal("Are you sure you want to cancel this booking?", () => {
          const allAppts = JSON.parse(localStorage.getItem('kbr_appointments')) || [];
          const updated = allAppts.filter(a => a.id !== apptId);
          localStorage.setItem('kbr_appointments', JSON.stringify(updated));
          renderAppointments();
        });
      }

      function approveCancellation(apptId) {
        showConfirmModal("Are you sure you want to approve this cancellation request and delete this booking?", () => {
          const allAppts = JSON.parse(localStorage.getItem('kbr_appointments')) || [];
          const updated = allAppts.filter(a => a.id !== apptId);
          localStorage.setItem('kbr_appointments', JSON.stringify(updated));
          renderAppointments();
        });
      }

      function rejectCancellation(apptId) {
        showConfirmModal("Are you sure you want to reject this cancellation request and keep the booking confirmed?", () => {
          const allAppts = JSON.parse(localStorage.getItem('kbr_appointments')) || [];
          const updated = allAppts.map(a => {
            if (a.id === apptId) return { ...a, status: 'confirmed' };
            return a;
          });
          localStorage.setItem('kbr_appointments', JSON.stringify(updated));
          renderAppointments();
        });
      }

      function renderAppointments() {
        const appts = getAppointmentsForRole();
        const gridContainer = document.getElementById("services-grid");
        if (!gridContainer) return;

        let colsHtml = "";
        servicesList.forEach(service => {
          const serviceAppts = appts.filter(a => getServiceGroup(a.title) === service);
          const count = serviceAppts.length;

          const cardsHtml = serviceAppts.length > 0 ? serviceAppts.map(a => {
            const canApprovePending = a.status === 'pending';
            const canApproveCancellation = a.status === 'cancellation_requested';

            let badgeClass = 'bg-warning/15 text-warning border border-warning/30';
            let statusText = a.status || 'pending';
            if (a.status === 'confirmed') {
              badgeClass = 'bg-success/15 text-success border border-success/30';
            } else if (a.status === 'cancellation_requested') {
              badgeClass = 'bg-destructive/15 text-destructive border border-destructive/30';
              statusText = 'cancel requested';
            }

            return `
              <div class="p-3 border border-border rounded-lg bg-background space-y-2 text-xs hover:shadow-sm transition-all duration-200 text-left">
                <div>
                  <div class="font-bold text-foreground break-words">${a.title}</div>
                  <div class="text-[10px] text-muted-foreground mt-1 space-y-0.5">
                    <div class="flex items-center gap-1"><span>📅</span> <span>${a.date}</span></div>
                    <div class="flex items-center gap-1"><span>👤</span> <span>${a.with || 'Staff'}</span></div>
                    ${a.client ? `<div class="flex items-center gap-1"><span>🏢</span> <span class="truncate">${a.client}</span></div>` : ''}
                  </div>
                </div>
                <div class="flex flex-col gap-1.5 pt-1">
                  <span class="inline-block text-[9px] font-bold px-2 py-0.5 rounded-full capitalize text-center ${badgeClass}">${statusText}</span>
                  
                  ${canApprovePending ? `
                    <button class="approve-btn w-full bg-success text-success-foreground hover:opacity-90 active:scale-95 text-[9px] py-1 rounded font-medium shadow-sm transition-all" data-id="${a.id}">
                      Approve
                    </button>
                    <button class="cancel-pending-btn w-full bg-destructive text-destructive-foreground hover:opacity-90 active:scale-95 text-[9px] py-1 rounded font-medium shadow-sm transition-all" data-id="${a.id}">
                      Cancel
                    </button>
                  ` : ''}

                  ${canApproveCancellation ? `
                    <button class="approve-cancel-btn w-full bg-destructive text-destructive-foreground hover:opacity-90 active:scale-95 text-[9px] py-1 rounded font-medium shadow-sm" data-id="${a.id}">
                      Approve Cancel
                    </button>
                    <button class="reject-cancel-btn w-full bg-muted border border-border hover:bg-muted/70 active:scale-95 text-[9px] py-1 rounded font-medium shadow-sm" data-id="${a.id}">
                      Keep Booking
                    </button>
                  ` : ''}
                </div>
              </div>
            `;
          }).join("") : `<div class="text-[11px] text-muted-foreground italic text-center py-4 bg-muted/10 rounded-lg border border-dashed border-border/50 w-full">No bookings</div>`;

          colsHtml += `
            <div class="flex-1 min-w-[170px] bg-muted/20 border border-border/60 rounded-xl p-3 flex flex-col gap-3">
              <div class="flex items-center justify-between border-b border-border/40 pb-2 shrink-0">
                <span class="font-bold text-xs text-foreground truncate" title="${service}">${service}</span>
                <span class="bg-primary/10 text-primary text-[10px] font-bold px-2 py-0.5 rounded-full">${count}</span>
              </div>
              <div class="flex-1 overflow-y-auto space-y-2.5 max-h-[350px] pr-1">
                ${cardsHtml}
              </div>
            </div>
          `;
        });

        gridContainer.innerHTML = colsHtml;

        // Bind click handlers
        document.querySelectorAll(".approve-btn").forEach(btn => {
          btn.onclick = (e) => approveAppointment(btn.getAttribute("data-id"));
        });
        document.querySelectorAll(".approve-cancel-btn").forEach(btn => {
          btn.onclick = (e) => approveCancellation(btn.getAttribute("data-id"));
        });
        document.querySelectorAll(".reject-cancel-btn").forEach(btn => {
          btn.onclick = (e) => rejectCancellation(btn.getAttribute("data-id"));
        });
        document.querySelectorAll(".cancel-pending-btn").forEach(btn => {
          btn.onclick = (e) => deleteAppointment(btn.getAttribute("data-id"));
        });
      }

      function renderTasks() {
        const tasks = JSON.parse(localStorage.getItem('kbr_employee_tasks')) || [];
        
        // Render Task List
        const listContainer = document.getElementById("tasks-list-container");
        if (listContainer) {
          listContainer.innerHTML = tasks.length > 0 ? tasks.map(t => {
            return `
              <div class="flex items-start justify-between p-3 border border-border rounded-lg bg-background hover:shadow-sm transition-all duration-150">
                <div class="space-y-1">
                  <div class="font-semibold text-sm text-foreground text-left">${t.text}</div>
                  <div class="flex items-center gap-2">
                    <span class="inline-block text-[10px] font-bold px-2 py-0.5 rounded-full border ${t.priority==='high'?'border-primary text-primary':t.priority==='medium'?'border-warning text-warning':'border-muted-foreground text-muted-foreground'}">${t.priority}</span>
                    <span class="text-[10px] text-muted-foreground">Assigned to: <strong class="text-foreground">${t.assigned}</strong></span>
                  </div>
                </div>
                
                <div class="flex items-center gap-3 shrink-0">
                  <div class="flex flex-col gap-1 items-end">
                    <label class="text-[9px] text-muted-foreground font-bold">Assign Employee</label>
                    <select class="task-assign-select bg-background border border-border rounded-lg px-2 py-1 text-xs focus:ring-1 focus:ring-primary focus:outline-none text-foreground font-medium" data-id="${t.id}">
                      ${employeesList.map(emp => `
                        <option value="${emp}" ${t.assigned === emp ? 'selected' : ''}>
                          ${emp} (${getEmployeeTaskCount(emp)})
                        </option>
                      `).join("")}
                    </select>
                  </div>
                  
                  <button class="delete-task-btn text-destructive hover:text-destructive/80 p-1 mt-3" data-id="${t.id}" title="Delete Task">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                  </button>
                </div>
              </div>
            `;
          }).join("") : `<div class="text-sm text-muted-foreground text-center py-6">No tasks currently defined.</div>`;
        }

        // Render Employee Summary Card
        const summaryContainer = document.getElementById("employee-summary-container");
        if (summaryContainer) {
          summaryContainer.innerHTML = employeesList.map(emp => {
            const count = getEmployeeTaskCount(emp);
            return `
              <div class="flex items-center justify-between text-xs py-1 border-b border-border/30 last:border-0">
                <span class="text-muted-foreground font-medium">${emp}</span>
                <span class="font-bold ${count > 0 ? 'text-primary' : 'text-muted-foreground bg-muted px-1.5 py-0.5 rounded'}">${count} task${count === 1 ? '' : 's'}</span>
              </div>
            `;
          }).join("");
        }

        // Add reassign handlers
        document.querySelectorAll(".task-assign-select").forEach(select => {
          select.addEventListener("change", (e) => {
            const taskId = parseInt(e.target.dataset.id);
            const newAssignee = e.target.value;
            
            let tasks = JSON.parse(localStorage.getItem('kbr_employee_tasks')) || [];
            const task = tasks.find(t => t.id === taskId);
            if (task) {
              task.assigned = newAssignee;
              localStorage.setItem('kbr_employee_tasks', JSON.stringify(tasks));
              renderTasks();
            }
          });
        });

        // Add delete handlers
        document.querySelectorAll(".delete-task-btn").forEach(btn => {
          btn.onclick = (e) => {
            const btnEl = e.target.closest(".delete-task-btn");
            const taskId = parseInt(btnEl.dataset.id);
            showConfirmModal("Are you sure you want to delete this task?", () => {
              let tasks = JSON.parse(localStorage.getItem('kbr_employee_tasks')) || [];
              const filtered = tasks.filter(t => t.id !== taskId);
              localStorage.setItem('kbr_employee_tasks', JSON.stringify(filtered));
              renderTasks();
            });
          };
        });

        if (typeof lucide !== 'undefined') lucide.createIcons();
      }

      // Initialize Admin view
      renderAppointments();
      renderTasks();

      // Setup task form events
      const addTaskBtn = document.getElementById("add-task-btn");
      const taskForm = document.getElementById("create-task-form");
      const cancelTaskBtn = document.getElementById("cancel-task-btn");
      const saveTaskBtn = document.getElementById("save-task-btn");
      const newTaskSelect = document.getElementById("new-task-assignee");

      if (addTaskBtn && taskForm) {
        addTaskBtn.onclick = () => {
          if (newTaskSelect) {
            newTaskSelect.innerHTML = employeesList.map(emp => `
              <option value="${emp}">
                ${emp} (${getEmployeeTaskCount(emp)})
              </option>
            `).join("");
          }
          taskForm.classList.remove("hidden");
        };
      }

      if (cancelTaskBtn && taskForm) {
        cancelTaskBtn.onclick = () => {
          taskForm.classList.add("hidden");
          document.getElementById("new-task-text").value = '';
        };
      }

      if (saveTaskBtn && taskForm) {
        saveTaskBtn.onclick = () => {
          const text = document.getElementById("new-task-text").value.trim();
          const assignee = document.getElementById("new-task-assignee").value;
          const priority = document.getElementById("new-task-priority").value;

          if (!text) return alert("Please enter task description.");

          let tasks = JSON.parse(localStorage.getItem('kbr_employee_tasks')) || [];
          const newTask = {
            id: Date.now(),
            text: text,
            assigned: assignee,
            priority: priority
          };
          tasks.push(newTask);
          localStorage.setItem('kbr_employee_tasks', JSON.stringify(tasks));
          
          taskForm.classList.add("hidden");
          document.getElementById("new-task-text").value = '';
          renderTasks();
        };
      }
    }

    // --- Employee-specific JavaScript logic ---
    if (session.role === "employee") {
      function renderCalendar() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        const monthTitleEl = document.getElementById("month-title");
        if (monthTitleEl) monthTitleEl.innerText = `${monthNames[month]} ${year}`;
        
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        
        const roleAppts = getAppointmentsForRole().filter(a => a.with === session.name);
        const eventDays = new Set();
        
        roleAppts.forEach(a => {
          const match = a.date.match(/^(\d{4})-(\d{2})-(\d{2})/);
          if (match) {
             const aY = parseInt(match[1]);
             const aM = parseInt(match[2]) - 1;
             const aD = parseInt(match[3]);
             if (aY === year && aM === month) {
               eventDays.add(aD);
             }
          } else {
             if (a.date.startsWith(monthNames[month]) && year === 2026) {
                const dMatch = a.date.match(/ (\d+) /);
                if (dMatch) eventDays.add(parseInt(dMatch[1]));
             }
          }
        });

        let gridHtml = '';
        for (let i = 0; i < firstDay; i++) {
          gridHtml += `<div></div>`;
        }
        for (let day = 1; day <= daysInMonth; day++) {
          const hasEvent = eventDays.has(day);
          
          gridHtml += `
            <div class="py-2 relative rounded-lg transition-colors ${hasEvent?'text-primary font-bold':''}">
              <span class="${hasEvent?'border-2 border-primary/30 rounded-lg px-2 py-1 bg-primary/5':''} pointer-events-none">${day}</span>
              ${hasEvent?'<div class="w-1.5 h-1.5 bg-primary rounded-full mx-auto mt-1 pointer-events-none"></div>':''}
            </div>
          `;
        }
        const gridEl = document.getElementById("cal-grid");
        if (gridEl) gridEl.innerHTML = gridHtml;
      }

      function renderEmployeeAppointments() {
        const appts = getAppointmentsForRole().filter(a => a.with === session.name);
        const apptListEl = document.getElementById("appt-list");
        if (!apptListEl) return;

        const listHtml = appts.length > 0 ? appts.map(a => {
          let badgeClass = 'bg-warning/15 text-warning border border-warning/30';
          let statusText = a.status || 'pending';
          if (a.status === 'confirmed') {
            badgeClass = 'bg-success/15 text-success border border-success/30';
          } else if (a.status === 'cancellation_requested') {
            badgeClass = 'bg-destructive/15 text-destructive border border-destructive/30';
            statusText = 'cancellation requested';
          }

          return `
            <div class="flex items-start justify-between p-3 border border-border rounded-lg bg-background hover:shadow-sm transition-all duration-200">
              <div>
                <div class="font-bold text-sm md:text-base">${a.title}</div>
                <div class="text-xs md:text-sm text-muted-foreground mt-0.5 flex flex-wrap gap-x-3 gap-y-1">
                  <span>📅 ${a.date}</span>
                  <span>👤 with ${a.with || 'KBR Staff'}</span>
                  ${a.client ? `<span>🏢 Client: ${a.client}</span>` : ''}
                </div>
              </div>
              <div class="flex flex-col items-end gap-2 shrink-0">
                <span class="text-[10px] md:text-xs font-bold px-2.5 py-0.5 rounded-full capitalize ${badgeClass}">${statusText}</span>
              </div>
            </div>
          `;
        }).join("") : '<div class="text-sm text-muted-foreground">No appointments booked.</div>';
        
        apptListEl.innerHTML = listHtml;
      }

      // Initialize Employee view
      renderCalendar();
      renderEmployeeAppointments();

      // Navigation listeners
      const prevBtn = document.getElementById("prev-month");
      const nextBtn = document.getElementById("next-month");
      if (prevBtn) {
        prevBtn.addEventListener("click", () => {
          currentDate.setMonth(currentDate.getMonth() - 1);
          renderCalendar();
        });
      }
      if (nextBtn) {
        nextBtn.addEventListener("click", () => {
          currentDate.setMonth(currentDate.getMonth() + 1);
          renderCalendar();
        });
      }
    }

    if (typeof lucide !== 'undefined') lucide.createIcons();
  }
</script>
</body>
</html>
