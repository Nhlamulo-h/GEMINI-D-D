<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Checkout Gateway — KBR</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/tailwind-config.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/billing-store.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/dark-mode.js"></script>
  <script src="../js/scroll-to-top.js"></script>
  <script src="../js/payfast-checkout.js"></script>
  <!-- Load jsPDF from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    /* Premium custom styling for bank checkout inside SPA */
    .bank-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .bank-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 20px -8px rgba(0, 0, 0, 0.15);
    }
    /* Phone simulation styling */
    .phone-body {
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }
    .otp-notification {
      animation: slideDown 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes slideDown {
      from {
        transform: translateY(-100px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
  </style>
</head>
<body class="transition-colors">
<script>
  const session = requireAuth(["admin", "client"]);
  if (session) {
    initBillingStore();

    // Check for pending PayFast checkouts that returned back
    const pendingInvoiceId = localStorage.getItem("kbr_pending_payfast_invoice");
    if (pendingInvoiceId) {
      localStorage.removeItem("kbr_pending_payfast_invoice");
      payInvoice(pendingInvoiceId, null, "PayFast Secure Gateway");
      alert(`Invoice ${pendingInvoiceId} payment via PayFast was verified and captured successfully!`);
      window.location.href = "billing.html";
    }

    const pendingCartPurchase = localStorage.getItem("kbr_pending_payfast_cart");
    if (pendingCartPurchase) {
      localStorage.removeItem("kbr_pending_payfast_cart");
      unlockPurchasedCourses("PayFast Secure Gateway");
      window.location.href = "training.html?purchased=true";
    }

    function fmt(n) {
      return Number(n).toLocaleString('en-ZA', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    // Wizard State Variables
    let selectedMethod = "bank_eft"; // bank_eft, card, manual_eft
    let selectedBankId = "";
    let selectedBankName = "";
    let selectedVerificationMethod = "app_push"; // app_push, sms_otp
    let verificationSource = "bank_eft"; // bank_eft, card
    
    // Generate random 6-digit OTP code on load
    const generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();

    // Check parameters
    const urlParams = new URLSearchParams(window.location.search);
    const invoiceId = urlParams.get('invoiceId');
    let isInvoiceMode = false;
    let invoice = null;

    if (invoiceId) {
      invoice = getInvoiceById(invoiceId);
      if (invoice && invoice.status === 'unpaid') {
        isInvoiceMode = true;
      }
    }

    // Totals calculations
    let total = 0;
    if (isInvoiceMode) {
      total = invoice.amount;
    } else {
      const cart = getCart();
      cart.forEach(item => {
        const cleanPrice = Number(item.price.replace(/[^\d]/g, ""));
        total += cleanPrice;
      });
    }

    const vat = total - (total / 1.15);
    const subtotal = total / 1.15;

    // Billing Form values stored
    let billingData = {
      name: session.name || "",
      company: session.role === "admin" ? "KBR Corporate" : (session.name || "Personal Client"),
      email: session.email || "",
      phone: "",
      address: ""
    };

    function renderCheckoutPage() {
      // If Cart Mode and cart is empty, show empty state
      if (!isInvoiceMode && getCart().length === 0) {
        return `
          <div class="px-6 py-16 max-w-lg mx-auto text-center space-y-6 bg-card border border-border rounded-xl">
            <div class="w-16 h-16 bg-primary/10 text-primary rounded-full flex items-center justify-center mx-auto scale-110">
              <i data-lucide="shopping-cart" class="w-8 h-8"></i>
            </div>
            <div>
              <h2 class="font-heading text-2xl font-bold text-foreground">Your Cart is Empty</h2>
              <p class="text-muted-foreground text-sm mt-2">You don't have any training courses in your checkout cart yet.</p>
            </div>
            <a href="training.html" class="inline-flex bg-primary text-primary-foreground hover:opacity-90 active:scale-95 px-6 py-2.5 rounded-xl text-sm font-bold transition-all items-center gap-1.5 shadow-lg shadow-primary/20">
              <i data-lucide="arrow-left" class="w-4 h-4"></i> Return to Training & Courses
            </a>
          </div>
        `;
      }

      // Generate Cart List HTML for Sidebar
      let itemsListHTML = "";
      if (isInvoiceMode) {
        itemsListHTML = `
          <div class="flex items-start justify-between py-4 gap-4">
            <div class="flex-1 min-w-0">
              <div class="font-bold text-sm text-foreground truncate">${invoice.id}</div>
              <div class="text-xs text-muted-foreground mt-0.5">${invoice.description}</div>
            </div>
            <div class="text-right shrink-0">
              <div class="font-bold text-sm text-primary">R${fmt(invoice.amount)}</div>
              <span class="inline-block text-[9px] font-bold text-primary bg-primary/10 px-2 py-0.5 rounded-full mt-1.5 uppercase tracking-wider">
                Invoice
              </span>
            </div>
          </div>
        `;
      } else {
        itemsListHTML = getCart().map(item => `
          <div class="flex items-start justify-between py-4 first:pt-0 last:pb-0 gap-4">
            <div class="flex-1 min-w-0">
              <div class="font-bold text-sm text-foreground truncate">${item.title}</div>
              <div class="text-xs text-muted-foreground mt-0.5">Professional course module</div>
            </div>
            <div class="text-right shrink-0">
              <div class="font-bold text-sm text-primary">${item.price}</div>
              <button onclick="handleRemoveItem('${item.id}')" class="text-[10px] text-destructive hover:underline font-bold mt-1 block ml-auto">
                Remove
              </button>
            </div>
          </div>
        `).join('<div class="border-t border-border"></div>');
      }

      return `
        <div class="px-6 py-6 max-w-6xl mx-auto space-y-6">
          <div>
            <h2 class="font-heading text-2xl font-bold text-foreground">Secure Checkout Gateway</h2>
            <p class="text-muted-foreground text-sm mt-1">Complete your secure transaction using encrypted banking & card channels.</p>
          </div>

          <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
            
            <!-- Dynamic Left Area: Portal State Wizard -->
            <div class="lg:col-span-2 space-y-6 bg-card border border-border rounded-2xl p-6 sm:p-8 shadow-sm transition-colors relative overflow-hidden min-h-[500px]">
              
              <!-- State Indicator -->
              <div id="step-indicator" class="flex justify-between items-center mb-8 border-b border-border pb-4">
                <div class="flex items-center gap-2">
                  <span id="step-num-1" class="w-7 h-7 rounded-full bg-primary text-primary-foreground flex items-center justify-center font-bold text-xs">1</span>
                  <span id="step-lbl-1" class="font-semibold text-xs sm:text-sm text-foreground">Billing Details</span>
                </div>
                <div class="h-px bg-border flex-1 mx-2 sm:mx-4"></div>
                <div class="flex items-center gap-2">
                  <span id="step-num-2" class="w-7 h-7 rounded-full bg-muted text-muted-foreground flex items-center justify-center font-bold text-xs">2</span>
                  <span id="step-lbl-2" class="font-medium text-xs sm:text-sm text-muted-foreground">Payment Option</span>
                </div>
                <div class="h-px bg-border flex-1 mx-2 sm:mx-4"></div>
                <div class="flex items-center gap-2">
                  <span id="step-num-3" class="w-7 h-7 rounded-full bg-muted text-muted-foreground flex items-center justify-center font-bold text-xs">3</span>
                  <span id="step-lbl-3" class="font-medium text-xs sm:text-sm text-muted-foreground">Verification (MFA)</span>
                </div>
              </div>

              <!-- ==================== STATE 1: BILLING DETAILS ==================== -->
              <div id="panel-billing" class="space-y-5">
                <h3 class="font-heading font-bold text-lg text-foreground flex items-center gap-2">
                  <i data-lucide="user" class="w-5 h-5 text-primary"></i> Contact & Billing Information
                </h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  <div>
                    <label class="text-xs font-semibold text-muted-foreground block mb-1">Billing Full Name</label>
                    <input type="text" id="bill-name" value="${billingData.name}" placeholder="Enter cardholder name" class="w-full border border-border rounded-xl px-4 py-2.5 text-sm bg-background focus:outline-none focus:ring-2 focus:ring-primary/50" />
                  </div>
                  <div>
                    <label class="text-xs font-semibold text-muted-foreground block mb-1">Company / Organization</label>
                    <input type="text" id="bill-company" value="${billingData.company}" placeholder="Enter company name" class="w-full border border-border rounded-xl px-4 py-2.5 text-sm bg-background focus:outline-none focus:ring-2 focus:ring-primary/50" />
                  </div>
                  <div>
                    <label class="text-xs font-semibold text-muted-foreground block mb-1">Email Address</label>
                    <input type="email" id="bill-email" value="${billingData.email}" placeholder="example@kbr.co.za" class="w-full border border-border rounded-xl px-4 py-2.5 text-sm bg-background focus:outline-none focus:ring-2 focus:ring-primary/50" />
                  </div>
                  <div>
                    <label class="text-xs font-semibold text-muted-foreground block mb-1">Contact Phone Number</label>
                    <input type="text" id="bill-phone" value="${billingData.phone}" placeholder="+27 82 123 4567" class="w-full border border-border rounded-xl px-4 py-2.5 text-sm bg-background focus:outline-none focus:ring-2 focus:ring-primary/50" />
                  </div>
                  <div class="sm:col-span-2">
                    <label class="text-xs font-semibold text-muted-foreground block mb-1">Billing Street Address</label>
                    <input type="text" id="bill-address" value="${billingData.address}" placeholder="128 Rivonia Road, Sandton, Johannesburg" class="w-full border border-border rounded-xl px-4 py-2.5 text-sm bg-background focus:outline-none focus:ring-2 focus:ring-primary/50" />
                  </div>
                </div>
                <div class="bg-muted/40 border border-border rounded-lg p-3.5 flex items-start gap-2.5 text-xs text-muted-foreground">
                  <i data-lucide="shield-check" class="w-4.5 h-4.5 text-primary shrink-0 mt-0.5"></i>
                  <p>Your transaction is encrypted using **SSL 256-bit secure gateway tunnels**. Invoices and receipts will be dispatched immediately upon successful settlement.</p>
                </div>
                <div class="pt-4 flex justify-between items-center">
                  <a href="${isInvoiceMode ? 'billing.html' : 'training.html'}" class="flex items-center gap-1.5 text-xs font-semibold text-muted-foreground hover:text-foreground">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Cancel
                  </a>
                  <button onclick="submitBillingForm()" class="bg-primary text-primary-foreground hover:opacity-90 active:scale-95 px-6 py-2.5 rounded-xl text-xs font-bold transition-all duration-150 flex items-center gap-2">
                    Continue to Payment <i data-lucide="arrow-right" class="w-4 h-4"></i>
                  </button>
                </div>
              </div>

              <!-- ==================== STATE 2: PAYMENT METHODS ==================== -->
              <div id="panel-method" class="hidden space-y-6">
                <div>
                  <h3 class="font-heading font-bold text-lg text-foreground">Select Payment Gateway Option</h3>
                  <p class="text-xs text-muted-foreground mt-0.5">Choose your secure payment channel to settle R${fmt(total)}.</p>
                </div>
                <div class="space-y-4">
                  <!-- Method 1: Instant Bank EFT -->
                  <label class="block relative border border-border bg-card rounded-xl p-5 cursor-pointer hover:border-primary/50 transition-all select-none group">
                    <input type="radio" name="pay_method" value="bank_eft" checked class="absolute top-5 right-5 w-5 h-5 accent-primary" />
                    <div class="flex items-start gap-4 pr-6">
                      <div class="p-3 bg-muted rounded-xl text-muted-foreground mt-1 group-hover:scale-105 transition-transform">
                        <i data-lucide="banknote" class="w-6 h-6"></i>
                      </div>
                      <div>
                        <h4 class="font-bold text-sm text-foreground">Secure Instant Bank EFT</h4>
                        <p class="text-xs text-muted-foreground mt-1">Authenticate directly via your online banking details. Features secure, instant verification, and zero transaction charges.</p>
                      </div>
                    </div>
                  </label>

                  <!-- Method 2: Credit / Debit Card -->
                  <label class="block relative border-2 border-primary bg-primary/5 rounded-xl p-5 cursor-pointer hover:border-primary/80 transition-all select-none group">
                    <input type="radio" name="pay_method" value="card" class="absolute top-5 right-5 w-5 h-5 accent-primary" />
                    <div class="flex items-start gap-4 pr-6">
                      <div class="p-3 bg-primary/10 rounded-xl text-primary mt-1 group-hover:scale-105 transition-transform">
                        <i data-lucide="credit-card" class="w-6 h-6"></i>
                      </div>
                      <div>
                        <span class="absolute top-0 right-16 -translate-y-1/2 bg-primary text-primary-foreground text-[10px] font-bold px-2 py-0.5 rounded-full uppercase tracking-wider">Popular</span>
                        <h4 class="font-bold text-sm text-foreground">Debit / Credit Card</h4>
                        <p class="text-xs text-muted-foreground mt-1">Secure payment via Visa, Mastercard, or American Express. Integrated with 3D Secure bank push approval or OTP alert.</p>
                      </div>
                    </div>
                  </label>

                  <!-- Method 3: Manual Bank Transfer -->
                  <label class="block relative border border-border bg-card rounded-xl p-5 cursor-pointer hover:border-primary/50 transition-all select-none group">
                    <input type="radio" name="pay_method" value="manual_eft" class="absolute top-5 right-5 w-5 h-5 accent-primary" />
                    <div class="flex items-start gap-4 pr-6">
                      <div class="p-3 bg-muted rounded-xl text-muted-foreground mt-1 group-hover:scale-105 transition-transform">
                        <i data-lucide="file-up" class="w-6 h-6"></i>
                      </div>
                      <div>
                        <h4 class="font-bold text-sm text-foreground">Manual EFT Bank Transfer</h4>
                        <p class="text-xs text-muted-foreground mt-1">Transfer the total directly to our corporate bank account. Upload your digital POP document to verify instantly.</p>
                      </div>
                    </div>
                  </label>
                </div>
                <div class="pt-4 flex justify-between items-center">
                  <button onclick="goBackToBilling()" class="flex items-center gap-1.5 text-xs font-semibold text-muted-foreground hover:text-foreground">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Back
                  </button>
                  <button onclick="submitPaymentMethod()" class="bg-primary text-primary-foreground hover:opacity-90 active:scale-95 px-6 py-2.5 rounded-xl text-xs font-bold transition-all duration-150 flex items-center gap-2">
                    Continue <i data-lucide="arrow-right" class="w-4 h-4"></i>
                  </button>
                </div>
              </div>

              <!-- ==================== STATE 2A: INSTANT EFT BANKS GRID ==================== -->
              <div id="panel-banks" class="hidden space-y-6">
                <div>
                  <h3 class="font-heading font-bold text-lg text-foreground">Choose Your Bank Gateway</h3>
                  <p class="text-xs text-muted-foreground mt-0.5">Select the bank you wish to securely authorize the payment from.</p>
                </div>
                <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
                  <!-- Capitec -->
                  <button onclick="selectBank('capitec', 'Capitec')" class="bank-btn bank-card flex flex-col items-center justify-center p-5 bg-white dark:bg-background/20 border border-border rounded-xl focus:ring-2 focus:ring-primary/40 group hover:border-[#003865]/40">
                    <div class="w-12 h-12 rounded-full bg-[#003865]/10 flex items-center justify-center text-[#003865] mb-3 group-hover:scale-105 transition-transform">
                      <i data-lucide="landmark" class="w-6 h-6"></i>
                    </div>
                    <span class="font-bold text-xs">Capitec</span>
                  </button>
                  <!-- FNB -->
                  <button onclick="selectBank('fnb', 'FNB')" class="bank-btn bank-card flex flex-col items-center justify-center p-5 bg-white dark:bg-background/20 border border-border rounded-xl focus:ring-2 focus:ring-primary/40 group hover:border-[#00A3A6]/40">
                    <div class="w-12 h-12 rounded-full bg-[#00A3A6]/10 flex items-center justify-center text-[#00A3A6] mb-3 group-hover:scale-105 transition-transform">
                      <i data-lucide="trees" class="w-6 h-6"></i>
                    </div>
                    <span class="font-bold text-xs">FNB</span>
                  </button>
                  <!-- Standard Bank -->
                  <button onclick="selectBank('std', 'Standard Bank')" class="bank-btn bank-card flex flex-col items-center justify-center p-5 bg-white dark:bg-background/20 border border-border rounded-xl focus:ring-2 focus:ring-primary/40 group hover:border-[#005A9C]/40">
                    <div class="w-12 h-12 rounded-full bg-[#005A9C]/10 flex items-center justify-center text-[#005A9C] mb-3 group-hover:scale-105 transition-transform">
                      <i data-lucide="flag" class="w-6 h-6"></i>
                    </div>
                    <span class="font-bold text-xs">Standard Bank</span>
                  </button>
                  <!-- Absa -->
                  <button onclick="selectBank('absa', 'Absa')" class="bank-btn bank-card flex flex-col items-center justify-center p-5 bg-white dark:bg-background/20 border border-border rounded-xl focus:ring-2 focus:ring-primary/40 group hover:border-[#D90000]/40">
                    <div class="w-12 h-12 rounded-full bg-[#D90000]/10 flex items-center justify-center text-[#D90000] mb-3 group-hover:scale-105 transition-transform">
                      <i data-lucide="circle-dot" class="w-6 h-6"></i>
                    </div>
                    <span class="font-bold text-xs">Absa</span>
                  </button>
                  <!-- Nedbank -->
                  <button onclick="selectBank('nedbank', 'Nedbank')" class="bank-btn bank-card flex flex-col items-center justify-center p-5 bg-white dark:bg-background/20 border border-border rounded-xl focus:ring-2 focus:ring-primary/40 group hover:border-[#004D40]/40">
                    <div class="w-12 h-12 rounded-full bg-[#004D40]/10 flex items-center justify-center text-[#004D40] mb-3 group-hover:scale-105 transition-transform">
                      <i data-lucide="leaf" class="w-6 h-6"></i>
                    </div>
                    <span class="font-bold text-xs">Nedbank</span>
                  </button>
                  <!-- TymeBank -->
                  <button onclick="selectBank('tyme', 'TymeBank')" class="bank-btn bank-card flex flex-col items-center justify-center p-5 bg-white dark:bg-background/20 border border-border rounded-xl focus:ring-2 focus:ring-primary/40 group hover:border-[#FF6F00]/40">
                    <div class="w-12 h-12 rounded-full bg-[#FF6F00]/10 flex items-center justify-center text-[#FF6F00] mb-3 group-hover:scale-105 transition-transform">
                      <i data-lucide="zap" class="w-6 h-6"></i>
                    </div>
                    <span class="font-bold text-xs">TymeBank</span>
                  </button>
                </div>
                <div class="pt-4 flex justify-between items-center">
                  <button onclick="goBackToMethod()" class="flex items-center gap-1.5 text-xs font-semibold text-muted-foreground hover:text-foreground">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Back
                  </button>
                </div>
              </div>

              <!-- ==================== STATE 2B: SECURE BANK ONLINE LOGIN ==================== -->
              <div id="panel-bank-login" class="hidden space-y-6">
                <div id="bank-login-header" class="p-4 rounded-xl flex items-center gap-3 border transition-colors bg-muted border-border text-foreground">
                  <div id="bank-login-icon-bg" class="w-10 h-10 rounded-full flex items-center justify-center bg-background/25">
                    <i id="bank-login-icon" data-lucide="landmark" class="w-5 h-5"></i>
                  </div>
                  <div>
                    <h4 id="bank-login-title" class="font-heading font-bold text-sm">Online Banking Login</h4>
                    <p class="text-[11px] opacity-85">Secure 256-bit credentials validation</p>
                  </div>
                </div>
                <div class="space-y-4">
                  <div>
                    <label class="text-xs font-semibold text-muted-foreground block mb-1">Account Number / Username</label>
                    <input type="text" id="bank-username" placeholder="Enter bank username or account number" class="w-full border border-border rounded-xl px-4 py-2.5 text-sm bg-background focus:outline-none focus:ring-2 focus:ring-primary/50" />
                  </div>
                  <div>
                    <label class="text-xs font-semibold text-muted-foreground block mb-1">Password / Secure Access Code</label>
                    <input type="password" id="bank-password" placeholder="••••••••" class="w-full border border-border rounded-xl px-4 py-2.5 text-sm bg-background focus:outline-none focus:ring-2 focus:ring-primary/50" />
                  </div>
                  <div class="bg-muted/40 border border-border rounded-lg p-3 flex items-start gap-2.5 text-xs text-muted-foreground">
                    <i data-lucide="info" class="w-4 h-4 text-primary shrink-0 mt-0.5"></i>
                    <p><strong>Testing Notice:</strong> Enter any credentials in the input fields to proceed. All entries are encrypted.</p>
                  </div>
                </div>
                <div class="pt-4 flex justify-between items-center">
                  <button onclick="goBackToBanks()" class="flex items-center gap-1.5 text-xs font-semibold text-muted-foreground hover:text-foreground">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Back
                  </button>
                  <button onclick="submitBankLogin()" class="bg-primary text-primary-foreground hover:opacity-90 active:scale-95 px-6 py-2.5 rounded-xl text-xs font-bold transition-all duration-150 flex items-center gap-2">
                    Sign In & Authorize <i data-lucide="log-in" class="w-4 h-4"></i>
                  </button>
                </div>
              </div>

              <!-- ==================== STATE 2C: CARD DETAILS ENTRY ==================== -->
              <div id="panel-card-details" class="hidden space-y-6">
                <div>
                  <h3 class="font-heading font-bold text-lg text-foreground">Secure Card Gateway</h3>
                  <p class="text-xs text-muted-foreground mt-0.5">Fill in your debit or credit card details below to settle the payment.</p>
                </div>
                <div class="space-y-4">
                  <!-- Dynamic premium card preview -->
                  <div class="bg-gradient-to-br from-slate-800 via-slate-900 to-black border border-slate-700 text-white rounded-2xl p-5 shadow-xl relative aspect-[1.586/1] w-full max-w-[320px] mx-auto flex flex-col justify-between select-none">
                    <div class="flex justify-between items-start">
                      <div class="flex items-center gap-1.5">
                        <i data-lucide="shield-check" class="w-5 h-5 text-primary"></i>
                        <span class="text-[9px] uppercase tracking-widest font-bold text-slate-300">Secure Card</span>
                      </div>
                      <div id="preview-card-logo" class="h-6 flex items-center justify-end text-right">
                        <i data-lucide="credit-card" class="w-6 h-6 opacity-60"></i>
                      </div>
                    </div>
                    <div class="space-y-1 my-3">
                      <div class="text-[8px] text-slate-400 uppercase tracking-wider">Card Number</div>
                      <div id="preview-card-number" class="font-mono text-md sm:text-lg tracking-[0.12em] text-center">•••• •••• •••• ••••</div>
                    </div>
                    <div class="flex justify-between items-end">
                      <div>
                        <div class="text-[8px] text-slate-400 uppercase tracking-wider">Card Holder</div>
                        <div id="preview-card-holder" class="text-xs truncate max-w-[170px] font-semibold tracking-wide uppercase">JANE SMITH</div>
                      </div>
                      <div class="text-right">
                        <div class="text-[8px] text-slate-400 uppercase tracking-wider">Expires</div>

    function wireCardPreviewListeners() {
      const holderInput = document.getElementById("card-holder");
      const numberInput = document.getElementById("card-number");
      const expiryInput = document.getElementById("card-expiry");

      if (holderInput) {
        holderInput.addEventListener("input", (e) => {
          document.getElementById("preview-card-holder").innerText = e.target.value.toUpperCase() || "JANE SMITH";
        });
      }

      if (numberInput) {
        numberInput.addEventListener("input", (e) => {
          let val = e.target.value.replace(/[^\d]/g, "");
          let formatted = "";
          for (let i = 0; i < val.length; i++) {
            if (i > 0 && i % 4 === 0) formatted += " ";
            formatted += val[i];
          }
          e.target.value = formatted;

          const logoPreview = document.getElementById("preview-card-logo");
          const typeIcon = document.getElementById("card-type-icon");

          if (val.startsWith("4")) {
            logoPreview.innerHTML = `<span class="text-[14px] italic font-extrabold tracking-widest text-[#FFF]">VISA</span>`;
            typeIcon.innerHTML = `<span class="text-[10px] italic font-black text-primary">VISA</span>`;
          } else if (val.startsWith("5")) {
            logoPreview.innerHTML = `<span class="text-[14px] font-bold text-[#FF5F00]">MC</span>`;
            typeIcon.innerHTML = `<span class="text-[10px] font-black text-warning">MC</span>`;
          } else {
            logoPreview.innerHTML = `<i data-lucide="credit-card" class="w-6 h-6 opacity-60"></i>`;
            typeIcon.innerHTML = `<i data-lucide="credit-card" class="w-5 h-5"></i>`;
            lucide.createIcons();
          }

          document.getElementById("preview-card-number").innerText = formatted || "•••• •••• •••• ••••";
        });
      }

      if (expiryInput) {
        expiryInput.addEventListener("input", (e) => {
          let val = e.target.value.replace(/[^\d]/g, "");
          if (val.length >= 2) {
            val = val.slice(0, 2) + "/" + val.slice(2, 4);
          }
          e.target.value = val;
          document.getElementById("preview-card-expiry").innerText = val || "MM/YY";
        });
      }
    }

    // PDF receipt helpers for Client
    let cachedLogoImage = null;
    function loadLogoImage() {
      if (cachedLogoImage) return Promise.resolve(cachedLogoImage);
      return new Promise((resolve) => {
        const img = new Image();
        img.src = "../assets/logo.png";
        img.onload = () => {
          cachedLogoImage = img;
          resolve(img);
        };
        img.onerror = () => {
          resolve(null);
        };
      });
    }

    function drawVectorLogo(doc, x, y) {
      // Background primary circle
      doc.setFillColor(224, 26, 95); // Crimson `#e01a5f`
      doc.circle(x + 8, y + 8, 8, 'F');
      
      // "KBR" letter overlay
      doc.setTextColor(255, 255, 255);
      doc.setFont("helvetica", "bold");
      doc.setFontSize(8);
      doc.text("KBR", x + 5, y + 10.5);
      
      // Right side text logo
      doc.setTextColor(34, 31, 32); // Charcoal `#221f20`
      doc.setFont("helvetica", "bold");
      doc.setFontSize(14);
      doc.text("KBR", x + 20, y + 7);
      
      doc.setFont("helvetica", "normal");
      doc.setFontSize(8);
      doc.setTextColor(120, 120, 120);
      doc.text("BUSINESS SOLUTIONS", x + 20, y + 11);
    }

    window.downloadReceiptPDF = function() {
      const receiptId = document.getElementById("receipt-id").innerText;
      const refCode = document.getElementById("receipt-invoice-id").innerText;
      const method = document.getElementById("receipt-method").innerText;
      const time = document.getElementById("receipt-time").innerText;
      const amount = document.getElementById("receipt-amount").innerText;
      const clientName = (session && session.name) || "Client";

      loadLogoImage().then((logoImg) => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({
          orientation: "portrait",
          unit: "mm",
          format: "a4"
        });

        const startX = 14;
        let currentY = 18;

        // Draw Logo
        if (logoImg) {
          try {
            doc.addImage(logoImg, 'PNG', startX, currentY, 35, 14);
          } catch (e) {
            drawVectorLogo(doc, startX, currentY);
          }
        } else {
          drawVectorLogo(doc, startX, currentY);
        }

        // Title & Document Ref (Right side)
        doc.setTextColor(224, 26, 95); // Crimson
        doc.setFont("helvetica", "bold");
        doc.setFontSize(22);
        doc.text("PAYMENT RECEIPT", 196, currentY + 4, { align: "right" });

        doc.setTextColor(80, 80, 80);
        doc.setFont("helvetica", "normal");
        doc.setFontSize(9);
        doc.text(`Receipt ID: ${receiptId}`, 196, currentY + 10, { align: "right" });
        doc.text(`Timestamp: ${time}`, 196, currentY + 15, { align: "right" });

        // Divider Line
        currentY = 38;
        doc.setDrawColor(220, 220, 220);
        doc.setLineWidth(0.5);
        doc.line(startX, currentY, 196, currentY);

        // Billing Information
        currentY = 48;
        doc.setFont("helvetica", "bold");
        doc.setFontSize(9);
        doc.setTextColor(120, 120, 120);
        doc.text("PAID TO:", startX, currentY);
        doc.text("PAID BY:", 110, currentY);

        currentY += 6;
        doc.setFont("helvetica", "bold");
        doc.setFontSize(11);
        doc.setTextColor(34, 31, 32); // Charcoal
        doc.text("KBR Business Solutions (Pty) Ltd", startX, currentY);
        doc.text(clientName, 110, currentY);

        currentY += 5;
        doc.setFont("helvetica", "normal");
        doc.setFontSize(9);
        doc.setTextColor(80, 80, 80);
        doc.text("128 Rivonia Road, Sandton", startX, currentY);
        doc.text("Client Business Account", 110, currentY);

        currentY += 4.5;
        doc.text("Johannesburg, 2196", startX, currentY);
        doc.text("South Africa", 110, currentY);

        currentY += 4.5;
        doc.text("info@kbr.co.za | +27 11 482 9012", startX, currentY);

        // Status Pill: SUCCESS / PAID
        currentY += 10;
        doc.setFont("helvetica", "bold");
        doc.setFontSize(9);
        doc.setFillColor(220, 245, 225); // light green
        doc.rect(startX, currentY, 32, 6, 'F');
        doc.setTextColor(30, 140, 60); // dark green
        doc.text("SUCCESS / PAID", startX + 16, currentY + 4.5, { align: "center" });

        // Payment details table
        currentY += 14;
        doc.setFillColor(245, 245, 245);
        doc.rect(startX, currentY, 182, 8, 'F');

        doc.setFont("helvetica", "bold");
        doc.setFontSize(9);
        doc.setTextColor(34, 31, 32);
        doc.text("Payment Reference / Description", startX + 4, currentY + 5.5);
        doc.text("Amount Settled (ZAR)", 192, currentY + 5.5, { align: "right" });

        currentY += 8;
        doc.setFont("helvetica", "normal");
        doc.setFontSize(10);
        doc.setTextColor(60, 60, 60);
        doc.text(`Payment for Reference: ${refCode}`, startX + 4, currentY + 7);
        doc.text(amount, 192, currentY + 7, { align: "right" });

        // Line Under Table
        currentY += 12;
        doc.setDrawColor(240, 240, 240);
        doc.line(startX, currentY, 196, currentY);

        // Payment details
        currentY += 10;
        doc.setFont("helvetica", "bold");
        doc.setFontSize(9);
        doc.setTextColor(120, 120, 120);
        doc.text("TRANSACTION DETAILS", startX, currentY);

        doc.setFont("helvetica", "normal");
        doc.setFontSize(9);
        doc.setTextColor(80, 80, 80);
        doc.text(`Authorized Gateway Method: ${method}`, startX, currentY + 5.5);
        doc.text(`Receipt Reference Number: ${receiptId}`, startX, currentY + 10.5);

        // Totals aligned right
        doc.setFont("helvetica", "bold");
        doc.setFontSize(12);
        doc.setTextColor(224, 26, 95); // Crimson
        doc.text("Total Paid:", 135, currentY + 5.5);
        doc.text(amount, 192, currentY + 5.5, { align: "right" });

        // Footer
        const footerY = 270;
        doc.setDrawColor(230, 230, 230);
        doc.setLineWidth(0.5);
        doc.line(startX, footerY, 196, footerY);

        doc.setFont("helvetica", "italic");
        doc.setFontSize(8);
        doc.setTextColor(150, 150, 150);
        doc.text("Thank you for your payment! This is an official secure receipt.", 105, footerY + 6, { align: "center" });

        const hash = btoa(receiptId + amount + refCode).slice(0, 32);
        doc.setFont("courier", "normal");
        doc.setFontSize(7.5);
        doc.text(`Security Verification Hash: SHA-256 [${hash}]`, 105, footerY + 10, { align: "center" });

        doc.save(`Receipt_${receiptId}.pdf`);
      });
    };

    window.printReceipt = function() {
      const session = getSession();
      if (session && session.role === "client") {
        downloadReceiptPDF();
      } else {
        window.print();
      }
    };

    // Redirect handler
    function startRedirectTimer() {
      const session = getSession();
      const isClient = session && session.role === "client";

      const cdEl = document.getElementById("countdown-num");
      const returnBtn = document.getElementById("btn-receipt-return");
      const btnPrint = document.getElementById("btn-print-receipt");
      
      let target = isInvoiceMode ? "billing.html" : "training.html?purchased=true";
      if (isClient) {
        target = isInvoiceMode ? "client-billing.html" : "training.html?purchased=true";
      }
      
      if (returnBtn) returnBtn.setAttribute("href", target);

      if (isClient) {
        if (cdEl) cdEl.classList.add("hidden");
        if (btnPrint) {
          btnPrint.innerHTML = `<i data-lucide="file-text" class="w-4 h-4 text-primary"></i> Download PDF Receipt`;
          lucide.createIcons();
        }
        return;
      }

      let count = 3;
      const interval = setInterval(() => {
        count--;
        if (cdEl) cdEl.innerText = `(${count}s)`;
        if (count <= 0) {
          clearInterval(interval);
          window.location.href = target;
        }
      }, 1000);
    }

    // Dynamic cart item removal
    window.handleRemoveItem = function(id) {
      removeFromCart(id);
      
      // Re-fetch totals
      total = 0;
      getCart().forEach(item => {
        const cleanPrice = Number(item.price.replace(/[^\d]/g, ""));
        total += cleanPrice;
      });

      // Re-populate page layout or return to training if cart emptied
      const container = document.getElementById("checkout-content");
      if (container) {
        container.innerHTML = renderCheckoutPage();
        lucide.createIcons();
        
        // Return step wizard to state 1
        showPanel("panel-billing");
        updateStepIndicator(1);
      }
    };

  }
</script>
