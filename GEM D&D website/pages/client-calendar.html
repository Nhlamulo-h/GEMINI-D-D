<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar — KBR</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/tailwind-config.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/billing-store.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/dark-mode.js"></script>
  <script src="../js/scroll-to-top.js"></script>
</head>
<body class="transition-colors">
<script>
  const session = requireAuth(["client"]);
  if (session) {
    // 1. Initialize data
    let allAppointments = JSON.parse(localStorage.getItem('kbr_appointments'));
    if (!allAppointments) {
      allAppointments = [
        {title:"tax consultation", date:"2026-04-01 at 12:00", with:"KBR Staff", client:"Smith Co.", status:"pending"},
        {title:"Tax Review - Smith Co.", date:"2026-03-05 at 10:00", with:"Sipho Ndlovu", client:"Smith Co.", status:"confirmed"},
        {title:"VAT Filing - Green & Sons", date:"2026-03-18 at 09:30", with:"Sipho Ndlovu", client:"Green & Sons", status:"confirmed"},
        {title:"Quarterly Review - TechStart", date:"2026-03-22 at 11:00", with:"Thandi Mokoena", client:"TechStart", status:"pending"},
        {title:"Bookkeeping - M. Johnson", date:"2026-03-25 at 15:00", with:"David van der Merwe", client:"M. Johnson", status:"confirmed"},
      ];
      localStorage.setItem('kbr_appointments', JSON.stringify(allAppointments));
    }

    let currentDate = new Date(2026, 2, 1); // Start at March 2026 to match demo data

    const content = `
      <div class="px-6 py-6 max-w-5xl mx-auto space-y-6">
        <div>
          <h2 class="font-heading text-2xl font-bold text-foreground">Calendar</h2>
          <p class="text-muted-foreground text-sm mt-1">Manage your appointments and scheduled tasks. Click any day to book.</p>
        </div>
        
        <div class="bg-card border border-border rounded-xl p-5">
          <div class="flex items-center justify-between mb-4">
            <h3 id="month-title" class="font-heading font-bold text-xl"></h3>
            <div class="flex gap-2">
              <button id="prev-month" class="text-muted-foreground hover:text-foreground w-8 h-8 flex items-center justify-center rounded-lg hover:bg-muted border border-border">&lt;</button>
              <button id="next-month" class="text-muted-foreground hover:text-foreground w-8 h-8 flex items-center justify-center rounded-lg hover:bg-muted border border-border">&gt;</button>
            </div>
          </div>
          <div class="grid grid-cols-7 text-center text-sm mb-2">
            ${["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=>`<div class="font-semibold text-muted-foreground py-2">${d}</div>`).join("")}
          </div>
          <div id="cal-grid" class="grid grid-cols-7 text-center text-sm gap-y-2"></div>
        </div>

        <div class="bg-card border border-border rounded-xl p-5">
          <h3 class="font-heading font-bold text-xl mb-4">Your Appointments</h3>
          <div id="appt-list" class="space-y-4"></div>
        </div>
      </div>

      <!-- Booking Modal -->
      <div id="booking-modal" class="hidden fixed inset-0 z-50 bg-background/80 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-card border border-border rounded-xl shadow-lg w-full max-w-md p-6">
          <h3 class="font-heading font-bold text-xl mb-4">Book Appointment</h3>
          <p id="booking-date-display" class="text-sm text-muted-foreground mb-4"></p>
          <div class="space-y-4">
            <div>
              <label class="text-sm font-medium mb-1 block">Service</label>
              <select id="b-title" class="w-full border border-border rounded-lg px-3 py-2 bg-background text-sm focus:outline-none focus:ring-2 focus:ring-primary/50">
                <option value="Bookkeeping">Bookkeeping</option>
                <option value="Tax & VAT Filing">Tax & VAT Filing</option>
                <option value="Payroll Management">Payroll Management</option>
                <option value="Financial Reporting">Financial Reporting</option>
                <option value="Company Registration">Company Registration</option>
                <option value="Full Package">Full Package</option>
              </select>
            </div>
            <div>
              <label class="text-sm font-medium mb-1 block">Assign Employee</label>
              <select id="b-employee" class="w-full border border-border rounded-lg px-3 py-2 bg-background text-sm focus:outline-none focus:ring-2 focus:ring-primary/50">
                <option value="Kabelo Rammutla">Kabelo Rammutla (Founder & CEO)</option>
                <option value="Thandi Mokoena">Thandi Mokoena (Senior Accountant)</option>
                <option value="Sipho Ndlovu">Sipho Ndlovu (Tax Specialist)</option>
                <option value="Lindiwe Dlamini">Lindiwe Dlamini (Payroll Manager)</option>
                <option value="David van der Merwe">David van der Merwe (Bookkeeper)</option>
                <option value="Nomsa Khumalo">Nomsa Khumalo (Client Relations Manager)</option>
              </select>
            </div>
            <div class="relative" id="time-select-container">
              <label class="text-sm font-medium mb-1 block">Time</label>
              <button type="button" id="time-dropdown-trigger" class="w-full flex items-center justify-between border border-border rounded-lg px-3 py-2 bg-background text-sm focus:outline-none focus:ring-2 focus:ring-primary/50 text-foreground">
                <span id="selected-time-text">09:00 AM</span>
                <i data-lucide="chevron-down" class="w-4 h-4 text-muted-foreground"></i>
              </button>
              <div id="time-dropdown-options" class="hidden absolute left-0 right-0 mt-1 max-h-48 overflow-y-auto bg-card border border-border rounded-lg shadow-lg z-50 text-sm">
                <!-- Dynamic options -->
              </div>
              <input type="hidden" id="b-time" value="09:00" />
            </div>
            <div class="flex gap-2 pt-2">
              <button id="b-submit" class="bg-primary hover:opacity-90 active:scale-95 text-primary-foreground px-4 py-2 rounded-lg text-sm font-medium flex-1">Book</button>
              <button id="b-cancel" class="text-muted-foreground hover:text-foreground px-4 py-2 rounded-lg text-sm font-medium flex-1">Cancel</button>
            </div>
          </div>
        </div>
      </div>
    `;

    renderAppLayout({ title: "Calendar", current: "client-calendar.html", contentHTML: content, session });

    const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    let selectedBookingDate = null; 

    function getAppointmentsForRole() {
      let all = JSON.parse(localStorage.getItem('kbr_appointments')) || [];
      let updated = false;
      all.forEach((a, index) => {
        if (!a.id) {
          a.id = `appt-${Date.now()}-${index}-${Math.floor(Math.random()*1000)}`;
          updated = true;
        }
      });
      if (updated) {
        localStorage.setItem('kbr_appointments', JSON.stringify(all));
      }

      // Display appointments matching the client company name strictly related to the person logged in
      return all.filter(a => a.client === session.name);
    }

    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      document.getElementById("month-title").innerText = `${monthNames[month]} ${year}`;
      
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      
      const roleAppts = getAppointmentsForRole();
      const eventDays = new Set();
      
      roleAppts.forEach(a => {
        const match = a.date.match(/^(\d{4})-(\d{2})-(\d{2})/);
        if (match) {
           const aY = parseInt(match[1]);
           const aM = parseInt(match[2]) - 1;
           const aD = parseInt(match[3]);
           if (aY === year && aM === month) {
             eventDays.add(aD);
           }
        } else {
           if (a.date.startsWith(monthNames[month]) && year === 2026) {
              const dMatch = a.date.match(/ (\d+) /);
              if (dMatch) eventDays.add(parseInt(dMatch[1]));
           }
        }
      });

      let gridHtml = '';
      for (let i = 0; i < firstDay; i++) {
        gridHtml += `<div></div>`;
      }
      for (let day = 1; day <= daysInMonth; day++) {
        const hasEvent = eventDays.has(day);
        const yyyy = year;
        const mm = String(month + 1).padStart(2, '0');
        const dd = String(day).padStart(2, '0');
        const dateStr = `${yyyy}-${mm}-${dd}`;
        
        gridHtml += `
          <div class="py-2 relative cursor-pointer hover:bg-muted/50 rounded-lg cal-day transition-colors ${hasEvent?'text-primary font-bold':''}" data-date="${dateStr}">
            <span class="${hasEvent?'border-2 border-primary/30 rounded-lg px-2 py-1 bg-primary/5':''} pointer-events-none">${day}</span>
            ${hasEvent?'<div class="w-1.5 h-1.5 bg-primary rounded-full mx-auto mt-1 pointer-events-none"></div>':''}
          </div>
        `;
      }
      document.getElementById("cal-grid").innerHTML = gridHtml;
    }

    function deleteAppointment(apptId) {
      showConfirmModal("Are you sure you want to cancel this booking?", () => {
        const allAppts = JSON.parse(localStorage.getItem('kbr_appointments')) || [];
        const updated = allAppts.filter(a => a.id !== apptId);
        localStorage.setItem('kbr_appointments', JSON.stringify(updated));
        
        renderCalendar();
        renderAppointments();
      });
    }

    function requestCancellation(apptId) {
      const allAppts = JSON.parse(localStorage.getItem('kbr_appointments')) || [];
      const appt = allAppts.find(a => a.id === apptId);
      if (!appt) return;

      const employee = appt.with;
      const phoneLookup = {
        "Kabelo Rammutla": "27812345678",
        "Thandi Mokoena": "27723456789",
        "Sipho Ndlovu": "27834567890",
        "Lindiwe Dlamini": "27845678901",
        "David van der Merwe": "27766789012",
        "Nomsa Khumalo": "27827890123"
      };

      const phone = phoneLookup[employee] || "27834567890";
      const message = `Hi ${employee}, I would like to request a cancellation for my appointment for "${appt.title}" scheduled for ${appt.date}. Please approve this cancellation request. Thank you!`;
      const encodedMsg = encodeURIComponent(message);
      const whatsappUrl = `https://wa.me/${phone}?text=${encodedMsg}`;

      showConfirmModal(`Since this booking is already confirmed, you must send a request to ${employee} via WhatsApp. Would you like to send the message now?`, () => {
        const updated = allAppts.map(a => {
          if (a.id === apptId) {
            return { ...a, status: 'cancellation_requested' };
          }
          return a;
        });
        localStorage.setItem('kbr_appointments', JSON.stringify(updated));
        
        window.open(whatsappUrl, '_blank');
        
        renderCalendar();
        renderAppointments();
      });
    }

    function renderAppointments() {
      const appts = getAppointmentsForRole();
      const listHtml = appts.length > 0 ? appts.map(a => {
        const canCancelPendingDirectly = a.status === 'pending';
        const canRequestCancellation = a.status === 'confirmed';

        let badgeClass = 'bg-warning/15 text-warning border border-warning/30';
        let statusText = a.status || 'pending';
        if (a.status === 'confirmed') {
          badgeClass = 'bg-success/15 text-success border border-success/30';
        } else if (a.status === 'cancellation_requested') {
          badgeClass = 'bg-destructive/15 text-destructive border border-destructive/30';
          statusText = 'cancellation requested';
        }

        return `
          <div class="flex items-start justify-between p-4 border border-border rounded-xl bg-background hover:shadow-sm transition-all duration-200">
            <div>
              <div class="font-bold text-sm md:text-base capitalize">${a.title}</div>
              <div class="text-xs md:text-sm text-muted-foreground mt-1 flex flex-wrap gap-x-3 gap-y-1">
                <span>📅 ${a.date}</span>
                <span>👤 with ${a.with || 'KBR Staff'}</span>
                ${a.client ? `<span>🏢 Client: ${a.client}</span>` : ''}
              </div>
            </div>
            <div class="flex flex-col items-end gap-2 shrink-0">
              <span class="text-[10px] md:text-xs font-bold px-2.5 py-0.5 rounded-full capitalize ${badgeClass}">${statusText}</span>
              
              ${canCancelPendingDirectly ? `
                <button class="cancel-pending-btn bg-destructive hover:opacity-90 active:scale-95 text-destructive-foreground text-[10px] md:text-xs px-3 py-1 rounded-lg font-medium shadow-sm transition-all duration-150 mt-1" data-id="${a.id}">
                  Cancel Booking
                </button>
              ` : ''}

              ${canRequestCancellation ? `
                <button class="request-cancel-btn bg-warning hover:opacity-90 active:scale-95 text-warning-foreground text-[10px] md:text-xs px-3 py-1 rounded-lg font-medium shadow-sm transition-all duration-150 mt-1" data-id="${a.id}">
                  Request Cancellation
                </button>
              ` : ''}
            </div>
          </div>
        `;
      }).join("") : '<div class="text-sm text-muted-foreground p-4 text-center">No appointments booked.</div>';
      
      document.getElementById("appt-list").innerHTML = listHtml;

      // Add click events to buttons
      document.querySelectorAll(".cancel-pending-btn").forEach(btn => {
        btn.onclick = (e) => {
          deleteAppointment(btn.getAttribute("data-id"));
        };
      });

      document.querySelectorAll(".request-cancel-btn").forEach(btn => {
        btn.onclick = (e) => {
          requestCancellation(btn.getAttribute("data-id"));
        };
      });
    }

    // Custom Time Dropdown Logic
    const timesList = [
      { value: "09:00", label: "09:00 AM" },
      { value: "09:30", label: "09:30 AM" },
      { value: "10:00", label: "10:00 AM" },
      { value: "10:30", label: "10:30 AM" },
      { value: "11:00", label: "11:00 AM" },
      { value: "11:30", label: "11:30 AM" },
      { value: "12:00", label: "12:00 PM" },
      { value: "12:30", label: "12:30 PM" },
      { value: "13:00", label: "13:00 PM" },
      { value: "13:30", label: "13:30 PM" },
      { value: "14:00", label: "14:00 PM" },
      { value: "14:30", label: "14:30 PM" },
      { value: "15:00", label: "15:00 PM" },
      { value: "15:30", label: "15:30 PM" },
      { value: "16:00", label: "16:00 PM" },
      { value: "16:30", label: "16:30 PM" },
      { value: "17:00", label: "17:00 PM" }
    ];

    const timeTrigger = document.getElementById("time-dropdown-trigger");
    const timeOptions = document.getElementById("time-dropdown-options");
    const timeHiddenInput = document.getElementById("b-time");
    const timeSelectedText = document.getElementById("selected-time-text");

    if (timeOptions) {
      timeOptions.innerHTML = timesList.map(t => `
        <div class="time-option px-3 py-2 cursor-pointer hover:bg-muted text-foreground transition-colors text-left" data-value="${t.value}">
          ${t.label}
        </div>
      `).join("");

      timeTrigger.onclick = (e) => {
        e.stopPropagation();
        timeOptions.classList.toggle("hidden");
      };

      timeOptions.querySelectorAll(".time-option").forEach(opt => {
        opt.onclick = (e) => {
          const val = opt.dataset.value;
          const label = opt.innerText;
          timeHiddenInput.value = val;
          timeSelectedText.innerText = label;
          timeOptions.classList.add("hidden");
        };
      });

      document.addEventListener("click", (e) => {
        if (timeOptions && !timeOptions.contains(e.target) && e.target !== timeTrigger) {
          timeOptions.classList.add("hidden");
        }
      });
    }

    // Init UI
    renderCalendar();
    renderAppointments();
    if(typeof lucide !== 'undefined') lucide.createIcons();

    // Calendar Navigation
    document.getElementById("prev-month").addEventListener("click", () => {
      currentDate.setMonth(currentDate.getMonth() - 1);
      renderCalendar();
    });
    document.getElementById("next-month").addEventListener("click", () => {
      currentDate.setMonth(currentDate.getMonth() + 1);
      renderCalendar();
    });

    // Booking Modal Triggers
    document.getElementById("cal-grid").addEventListener("click", (e) => {
      const dayEl = e.target.closest('.cal-day');
      if (dayEl) {
        selectedBookingDate = dayEl.dataset.date;
        document.getElementById("booking-date-display").innerText = "Booking for: " + selectedBookingDate;
        document.getElementById("booking-modal").classList.remove("hidden");
      }
    });

    document.getElementById("b-cancel").addEventListener("click", () => {
      document.getElementById("booking-modal").classList.add("hidden");
    });

    document.getElementById("b-submit").addEventListener("click", () => {
      const title = document.getElementById("b-title").value;
      const time = document.getElementById("b-time").value;
      const client = session.name;
      const assignedEmployee = document.getElementById("b-employee").value;
      
      if (!title || !time) return alert("Please fill in the title and time.");
      
      const allAppts = JSON.parse(localStorage.getItem('kbr_appointments')) || [];
      const newAppt = {
        id: `appt-${Date.now()}-${Math.floor(Math.random()*1000)}`,
        title: title,
        date: `${selectedBookingDate} at ${time}`,
        with: assignedEmployee,
        client: client,
        status: "pending"
      };
      
      allAppts.unshift(newAppt);
      localStorage.setItem('kbr_appointments', JSON.stringify(allAppts));
      
      // Reset & close
      document.getElementById("b-title").selectedIndex = 0;
      document.getElementById("b-employee").selectedIndex = 0;
      document.getElementById("b-time").value = "09:00";
      document.getElementById("selected-time-text").innerText = "09:00 AM";
      document.getElementById("booking-modal").classList.add("hidden");
      
      // Update UI
      renderCalendar();
      renderAppointments();
    });
  }
</script>
</body>
</html>
