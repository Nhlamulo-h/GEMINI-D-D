<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — KBR</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/tailwind-config.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/billing-store.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/dark-mode.js"></script>
  <script src="../js/scroll-to-top.js"></script>
</head>
<body class="transition-colors">
<script>  const session = requireAuth(["admin","employee","client"]);
  if (session) {
    if (session.role === "client") {
      window.location.href = "client-projects.html";
    }
    const DEFAULT_PROJECTS = [];
    if (!localStorage.getItem("kbr_projects")) {
      localStorage.setItem("kbr_projects", JSON.stringify(DEFAULT_PROJECTS));
    }

    const statusConfig = {
      completed:   { label:"Completed", icon:"check-circle", color:"text-success bg-success/10" },
      in_progress: { label:"In Progress", icon:"clock", color:"text-primary bg-primary/10" },
      pending:     { label:"Pending", icon:"alert-circle", color:"text-warning bg-warning/10" },
    };

    function getProjectsList() {
      const allProjects = JSON.parse(localStorage.getItem("kbr_projects")) || [];
      return session.role === "employee"
        ? allProjects.filter(p => p.assignee === session.name)
        : allProjects;
    }

    function render(filter) {
      const projects = getProjectsList();
      const filtered = filter === "all" ? projects : projects.filter(p => p.status === filter);
      if (filtered.length === 0) {
        return `
          <div class="bg-card border border-border rounded-xl p-8 text-center text-muted-foreground">
            <i data-lucide="folder-open" class="w-10 h-10 mx-auto mb-2 opacity-50 text-muted-foreground"></i>
            <p class="font-bold text-sm text-foreground">No Projects Found</p>
            <p class="text-xs mt-1">There are currently no projects assigned in this category.</p>
          </div>
        `;
      }
      return `
        <div class="space-y-3">
          ${filtered.map(p => {
            const c = statusConfig[p.status] || statusConfig.pending;
            
            // Link project files dynamically
            const files = getProjectFiles(p.id);
            const invoices = getInvoices();
            const projectInvoices = invoices.filter(inv => {
              return inv.company === p.client && (
                (p.name.includes("Tax") && inv.description.includes("Tax")) ||
                (p.name.includes("Payroll") && inv.description.includes("Payroll")) ||
                (p.name.includes("VAT") && inv.description.includes("VAT")) ||
                (p.name.includes("Bookkeeping") && inv.description.includes("Bookkeeping")) ||
                (p.name.includes("Review") && inv.description.includes("Consulting"))
              );
            });

            return `
              <div class="bg-card border border-border rounded-xl p-5 space-y-4">
                <div class="flex items-start justify-between">
                  <div class="flex items-center gap-2">
                    <i data-lucide="folder-open" class="w-4.5 h-4.5 text-primary"></i>
                    <h3 class="font-bold text-sm text-foreground">${p.name}</h3>
                  </div>
                  <span class="flex items-center gap-1 text-[11px] font-medium px-2.5 py-0.5 rounded-full ${c.color}">
                    <i data-lucide="${c.icon}" class="w-3 h-3"></i> ${c.label}
                  </span>
                </div>
                
                ${session.role === 'employee' ? `
                <div class="space-y-2">
                  <div class="text-xs text-muted-foreground">Assigned to: <strong class="text-foreground">${p.assignee}</strong></div>
                  <div class="text-xs text-muted-foreground">Deadline: <strong class="text-foreground">${p.deadline}</strong></div>
                  
                  <div class="space-y-3 bg-muted/20 p-3 rounded-lg border border-border/50">
                    <div class="flex flex-col gap-1.5">
                      <label class="text-[11px] font-semibold text-muted-foreground">Update Status</label>
                      <select id="status-select-${p.id}" class="w-full bg-background border border-border rounded-lg px-2.5 py-1.5 text-xs text-foreground focus:outline-none focus:ring-1 focus:ring-primary">
                        <option value="pending" ${p.status === 'pending' ? 'selected' : ''}>Pending</option>
                        <option value="in_progress" ${p.status === 'in_progress' ? 'selected' : ''}>In Progress</option>
                        <option value="completed" ${p.status === 'completed' ? 'selected' : ''}>Completed</option>
                      </select>
                    </div>

                    <button onclick="saveProjectProgress(${p.id})" class="w-full bg-primary hover:opacity-90 active:scale-[0.98] text-primary-foreground text-xs py-1.5 px-3 rounded-lg font-semibold transition-all flex items-center justify-center gap-1">
                      <i data-lucide="upload-cloud" class="w-3.5 h-3.5"></i> Save & Upload Progress
                    </button>
                  </div>
                </div>
                ` : `
                <div class="space-y-2">
                  ${(session.role==='admin'||session.role==='employee')?`<div class="text-xs text-muted-foreground">Assigned to: <strong class="text-foreground">${p.assignee}</strong></div>`:''}
                  <div class="text-xs text-muted-foreground">Deadline: <strong class="text-foreground">${p.deadline}</strong></div>
                  
                  ${session.role === 'admin' ? `
                    <div class="pt-1.5 flex gap-2">
                      <button onclick="contactAssigneeToUpdate('${p.assignee}', '${p.name}')" class="bg-success text-success-foreground hover:opacity-90 active:scale-95 text-xs py-1.5 px-3 rounded-lg font-semibold flex items-center justify-center gap-1.5 transition-all">
                        <i data-lucide="message-square" class="w-3.5 h-3.5"></i> Contact Employee
                      </button>
                      <button onclick="handleDeleteProject(${p.id})" class="border border-destructive hover:bg-destructive/10 text-destructive text-xs py-1.5 px-3 rounded-lg font-semibold flex items-center justify-center gap-1.5 transition-all">
                        <i data-lucide="trash-2" class="w-3.5 h-3.5"></i> Delete Project
                      </button>
                    </div>
                  ` : ''}
                </div>
                `}
                 <!-- Merged Invoices & Documents List -->
                ${session.role !== 'employee' ? `
                <div class="pt-3 border-t border-border/80 space-y-2">
                  <div class="text-xs font-bold text-foreground flex items-center gap-1">
                    <i data-lucide="files" class="w-3.5 h-3.5 text-primary"></i>
                    <span>Associated Invoices & Documents</span>
                  </div>
                  
                  <div class="space-y-1 bg-muted/30 p-2.5 rounded-lg border border-border/50">
                    ${projectInvoices.length === 0 && files.length === 0 ? `
                      <p class="text-[11px] text-muted-foreground">No documents uploaded yet.</p>
                    ` : ''}

                    ${projectInvoices.map(inv => `
                      <div class="flex items-center justify-between text-xs py-1 border-b border-border/30 last:border-0">
                        <div class="flex items-center gap-1.5 text-muted-foreground truncate mr-2">
                          <i data-lucide="file-text" class="w-3.5 h-3.5 text-primary shrink-0"></i>
                          <span class="truncate">Invoice_${inv.id}.txt (${inv.status==='paid'?'Paid':'Unpaid'})</span>
                        </div>
                      </div>
                    `).join("")}

                    ${files.map(f => `
                      <div class="flex items-center justify-between text-xs py-1 border-b border-border/30 last:border-0">
                        <div class="flex items-center gap-1.5 text-muted-foreground truncate mr-2">
                          <i data-lucide="file" class="w-3.5 h-3.5 text-success shrink-0"></i>
                          <span class="truncate">${f.name}</span>
                        </div>
                        ${session.role === 'admin' ? `
                        <button onclick="handleDeleteProjectFile('${f.id}')" class="text-destructive hover:text-destructive/80 p-1 flex items-center justify-center transition-colors" title="Delete document">
                          <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                        </button>
                        ` : ''}
                      </div>
                    `).join("")}
                  </div>

                  ${session.role === 'admin' ? `
                  <div class="pt-3 border-t border-dashed border-border/60">
                    <label class="text-[10px] font-bold text-muted-foreground block mb-1">Upload Project Document / Statement</label>
                    <div class="flex gap-2">
                      <input type="file" id="file-input-${p.id}" class="hidden" onchange="handleAdminProjectFileUpload(${p.id})" />
                      <button onclick="document.getElementById('file-input-${p.id}').click()" class="flex-1 bg-muted hover:bg-muted/80 text-muted-foreground border border-border border-dashed rounded-lg py-1.5 px-3 text-[11px] font-semibold flex items-center justify-center gap-1.5 transition-colors">
                        <i data-lucide="upload-cloud" class="w-3.5 h-3.5"></i> Select File to Upload
                      </button>
                    </div>
                  </div>
                  ` : ''}
                </div>
                ` : ''}
              </div>`;
          }).join("")}
        </div>
      `;
    }

    window.saveProjectProgress = function(projectId) {
      const statusSelect = document.getElementById(`status-select-${projectId}`);
      if (!statusSelect) return;

      const newStatus = statusSelect.value;

      const allProjects = JSON.parse(localStorage.getItem("kbr_projects")) || DEFAULT_PROJECTS;
      const projectIndex = allProjects.findIndex(p => p.id === projectId);
      if (projectIndex !== -1) {
        const oldStatus = allProjects[projectIndex].status;
        allProjects[projectIndex].status = newStatus;
        if (newStatus === "completed") {
          allProjects[projectIndex].progress = 100;
        } else if (newStatus === "pending") {
          allProjects[projectIndex].progress = 0;
        } else {
          if (oldStatus === "completed" || oldStatus === "pending" || allProjects[projectIndex].progress === 0 || allProjects[projectIndex].progress === 100) {
            allProjects[projectIndex].progress = 50;
          }
        }
        
        localStorage.setItem("kbr_projects", JSON.stringify(allProjects));

        alert("Project progress saved and uploaded successfully!");
        
        // Trigger UI reload
        const activeFilterBtn = document.querySelector(".filter-btn.bg-foreground");
        const activeFilter = activeFilterBtn ? activeFilterBtn.dataset.filter : "all";
        document.getElementById("project-list").innerHTML = render(activeFilter);
        lucide.createIcons();
      }
    };

    // Admin Project Delete
    window.handleDeleteProject = function(projectId) {
      if (confirm("Are you sure you want to delete this project?")) {
        const allProjects = JSON.parse(localStorage.getItem("kbr_projects")) || [];
        const filteredList = allProjects.filter(p => p.id !== projectId);
        localStorage.setItem("kbr_projects", JSON.stringify(filteredList));
        alert("Project deleted successfully.");
        window.location.reload();
      }
    };

    // WhatsApp contact function for Admin
    window.contactAssigneeToUpdate = function(assignee, projectName) {
      const phoneLookup = {
        "Kabelo Rammutla": "27812345678",
        "Thandi Mokoena": "27723456789",
        "Sipho Ndlovu": "27834567890",
        "Lindiwe Dlamini": "27845678901",
        "David van der Merwe": "27766789012",
        "Nomsa Khumalo": "27827890123"
      };

      const phone = phoneLookup[assignee] || "27834567890";
      const message = `Hi ${assignee}, could you please update the progress for project: "${projectName}"? Thanks!`;
      const encodedMsg = encodeURIComponent(message);
      const whatsappUrl = `https://wa.me/${phone}?text=${encodedMsg}`;
      window.open(whatsappUrl, '_blank');
    };

    // Admin Project File Uploader
    window.handleAdminProjectFileUpload = function(projectId) {
      const fileInput = document.getElementById(`file-input-${projectId}`);
      if (fileInput && fileInput.files.length > 0) {
        const file = fileInput.files[0];
        
        // Upload file content simulation
        uploadProjectFile(projectId, file.name, `SIMULATED DOCUMENT CONTENT: ${file.name}\nProject ID: ${projectId}\nUploaded by: Admin\nDate: ${new Date().toLocaleString()}\nThis is a securely stored document on the KBR portal.`);
        
        alert(`Document '${file.name}' has been successfully uploaded and will reflect on the client portal.`);
        
        // Trigger UI reload
        const activeFilterBtn = document.querySelector(".filter-btn.bg-foreground");
        const activeFilter = activeFilterBtn ? activeFilterBtn.dataset.filter : "all";
        document.getElementById("project-list").innerHTML = render(activeFilter);
        lucide.createIcons();
      }
    };

    // Admin Project File Delete
    window.handleDeleteProjectFile = function(fileId) {
      if (confirm("Are you sure you want to delete this document?")) {
        if (deleteProjectFile(fileId)) {
          alert("Document deleted successfully!");
          // Trigger UI reload
          const activeFilterBtn = document.querySelector(".filter-btn.bg-foreground");
          const activeFilter = activeFilterBtn ? activeFilterBtn.dataset.filter : "all";
          document.getElementById("project-list").innerHTML = render(activeFilter);
          lucide.createIcons();
        } else {
          alert("Failed to delete document.");
        }
      }
    };

    const content = `
      <div class="px-6 py-6 max-w-5xl mx-auto space-y-6">
        <div>
          <h2 class="font-heading text-2xl font-bold text-foreground">Projects</h2>
          <p class="text-muted-foreground text-sm mt-1">Track progress on ongoing tasks and milestones.</p>
        </div>

        ${session.role === "admin" ? `
        <!-- Admin Add Project Section -->
        <div class="bg-card border border-border rounded-xl p-5 space-y-4">
          <div class="flex items-center justify-between">
            <h3 class="font-heading font-bold text-lg text-foreground">Add Project</h3>
            <button id="toggle-project-btn" class="text-xs text-primary hover:underline font-semibold">Show Form</button>
          </div>
          
          <div id="add-project-form" class="hidden space-y-4 pt-2 border-t border-border/40">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="text-xs font-semibold text-muted-foreground block mb-1">Project Name</label>
                <input type="text" id="project-name" placeholder="e.g. Smith Co. - Tax Filing" class="w-full border border-border bg-background rounded-lg px-3 py-2 text-sm focus:ring-1 focus:ring-primary focus:outline-none text-foreground" />
              </div>
              <div>
                <label class="text-xs font-semibold text-muted-foreground block mb-1">Assign Client</label>
                <select id="project-client" class="w-full border border-border bg-background rounded-lg px-3 py-2 text-sm focus:ring-1 focus:ring-primary focus:outline-none text-foreground">
                  <option value="">Loading clients...</option>
                </select>
              </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="text-xs font-semibold text-muted-foreground block mb-1">Assign Employee</label>
                <select id="project-assignee" class="w-full border border-border bg-background rounded-lg px-3 py-2 text-sm focus:ring-1 focus:ring-primary focus:outline-none text-foreground">
                  <option value="">Loading employees...</option>
                </select>
              </div>
              <div>
                <label class="text-xs font-semibold text-muted-foreground block mb-1">Deadline Date</label>
                <input type="date" id="project-deadline" class="w-full border border-border bg-background rounded-lg px-3 py-2 text-sm focus:ring-1 focus:ring-primary focus:outline-none text-foreground" />
              </div>
            </div>

            <div class="flex justify-end gap-2 pt-1">
              <button id="cancel-project-btn" class="border border-border text-xs px-4 py-2 rounded-lg font-medium hover:bg-muted text-foreground">Cancel</button>
              <button id="save-project-btn" class="bg-primary hover:opacity-90 text-primary-foreground text-xs px-4 py-2 rounded-lg font-semibold shadow-sm transition-all">Create & Assign Project</button>
            </div>
          </div>
        </div>
        ` : ""}

        <div id="filter-bar" class="flex gap-2 overflow-x-auto pb-2">
          ${["all","in_progress","pending","completed"].map((f,i)=>`
            <button data-filter="${f}" class="filter-btn px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap ${i===0?'bg-foreground text-background':'bg-muted text-muted-foreground'}">
              ${f==="all"?"All":f.replace("_"," ").replace(/\b\w/g, c => c.toUpperCase())}
            </button>`).join("")}
        </div>
        <div id="project-list">${render("all")}</div>
      </div>
    `;
    renderAppLayout({ title: "Projects", current: "projects.html", contentHTML: content, session });

    document.querySelectorAll(".filter-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".filter-btn").forEach(b => {
          b.className = "filter-btn px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap bg-muted text-muted-foreground";
        });
        btn.className = "filter-btn px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap bg-foreground text-background";
        document.getElementById("project-list").innerHTML = render(btn.dataset.filter);
        lucide.createIcons();
      });
    });

    // Admin project creation and dynamic user selector logic
    if (session.role === "admin") {
      const toggleProjectBtn = document.getElementById("toggle-project-btn");
      const projectForm = document.getElementById("add-project-form");
      const cancelProjectBtn = document.getElementById("cancel-project-btn");
      const saveProjectBtn = document.getElementById("save-project-btn");

      if (toggleProjectBtn && projectForm) {
        toggleProjectBtn.onclick = () => {
          const isHidden = projectForm.classList.contains("hidden");
          if (isHidden) {
            projectForm.classList.remove("hidden");
            toggleProjectBtn.innerText = "Hide Form";
          } else {
            projectForm.classList.add("hidden");
            toggleProjectBtn.innerText = "Show Form";
          }
        };
      }

      if (cancelProjectBtn && projectForm && toggleProjectBtn) {
        cancelProjectBtn.onclick = () => {
          projectForm.classList.add("hidden");
          toggleProjectBtn.innerText = "Show Form";
          document.getElementById("project-name").value = "";
          document.getElementById("project-deadline").value = "";
        };
      }

      if (saveProjectBtn && projectForm && toggleProjectBtn) {
        saveProjectBtn.onclick = () => {
          const name = document.getElementById("project-name").value.trim();
          const client = document.getElementById("project-client").value;
          const assignee = document.getElementById("project-assignee").value;
          const deadlineRaw = document.getElementById("project-deadline").value;

          if (!name || !client || !assignee || !deadlineRaw) {
            return alert("Please fill in all project parameters.");
          }

          const dateObj = new Date(deadlineRaw);
          const deadlineFormatted = dateObj.toLocaleDateString("en-US", {
            year: "numeric",
            month: "short",
            day: "numeric"
          });

          const allProjectsList = JSON.parse(localStorage.getItem("kbr_projects")) || [];
          const nextId = allProjectsList.length > 0 ? Math.max(...allProjectsList.map(p => p.id)) + 1 : 1;

          const newProj = {
            id: nextId,
            name: name,
            client: client,
            status: "pending",
            progress: 0,
            deadline: deadlineFormatted,
            assignee: assignee
          };

          allProjectsList.push(newProj);
          localStorage.setItem("kbr_projects", JSON.stringify(allProjectsList));

          alert("Project successfully created and assigned!");
          
          projectForm.classList.add("hidden");
          toggleProjectBtn.innerText = "Show Form";
          document.getElementById("project-name").value = "";
          document.getElementById("project-deadline").value = "";
          
          document.getElementById("project-list").innerHTML = render("all");
          lucide.createIcons();
        };
      }

      // Load clients and employees from Firebase
      ensureFirebaseLoaded(() => {
        const db = firebase.database();
        db.ref('users').on('value', (snapshot) => {
          const usersObj = snapshot.val() || {};
          const usersList = Object.keys(usersObj).map(uid => ({
            id: uid,
            ...usersObj[uid]
          }));

          const clientsList = usersList.filter(u => u.role === 'client');
          const employeesList = usersList.filter(u => u.role === 'employee');

          const clientSel = document.getElementById("project-client");
          if (clientSel) {
            if (clientsList.length === 0) {
              clientSel.innerHTML = `
                <option value="Smith Co.">Smith Co. (Default)</option>
                <option value="Apex Ltd">Apex Ltd (Default)</option>
                <option value="Green & Sons">Green & Sons (Default)</option>
                <option value="TechStart">TechStart (Default)</option>
              `;
            } else {
              clientSel.innerHTML = clientsList.map(c => `
                <option value="${c.name}">${c.name} ${c.company ? `(${c.company})` : ''}</option>
              `).join("");
            }
          }

          const assigneeSel = document.getElementById("project-assignee");
          if (assigneeSel) {
            if (employeesList.length === 0) {
              assigneeSel.innerHTML = `
                <option value="Sipho Ndlovu">Sipho Ndlovu</option>
                <option value="Lindiwe Dlamini">Lindiwe Dlamini</option>
                <option value="Thandi Mokoena">Thandi Mokoena</option>
                <option value="David van der Merwe">David van der Merwe</option>
              `;
            } else {
              assigneeSel.innerHTML = employeesList.map(e => `
                <option value="${e.name}">${e.name}</option>
              `).join("");
            }
          }
        });
      });
    }

    // Refresh UI on storage updates (to sync database edits in real-time)
    window.addEventListener("storage", () => {
      const activeFilterBtn = document.querySelector(".filter-btn.bg-foreground");
      const activeFilter = activeFilterBtn ? activeFilterBtn.dataset.filter : "all";
      document.getElementById("project-list").innerHTML = render(activeFilter);
      lucide.createIcons();
    });
  }
</script>
</body>
</html>
