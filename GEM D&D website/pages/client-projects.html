<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — KBR</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/tailwind-config.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/billing-store.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/dark-mode.js"></script>
  <script src="../js/scroll-to-top.js"></script>
  <!-- Load jsPDF from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="transition-colors">
<script>
  const session = requireAuth(["client"]);
  if (session) {
    const DEFAULT_PROJECTS = [];
    if (!localStorage.getItem("kbr_projects")) {
      localStorage.setItem("kbr_projects", JSON.stringify(DEFAULT_PROJECTS));
    }
    const statusConfig = {
      completed:   { label:"Completed", icon:"check-circle", color:"text-success bg-success/10" },
      in_progress: { label:"In Progress", icon:"clock", color:"text-primary bg-primary/10" },
      pending:     { label:"Pending", icon:"alert-circle", color:"text-warning bg-warning/10" },
    };
    
    function getProjectsList() {
      const allProjects = JSON.parse(localStorage.getItem("kbr_projects")) || [];
      return allProjects.filter(p => p.client === session.name);
    }

    function render(filter) {
      const projects = getProjectsList();
      const filtered = filter === "all" ? projects : projects.filter(p => p.status === filter);
      if (filtered.length === 0) {
        return `
          <div class="bg-card border border-border rounded-xl p-8 text-center text-muted-foreground">
            <i data-lucide="folder-open" class="w-10 h-10 mx-auto mb-2 opacity-50 text-muted-foreground"></i>
            <p class="font-bold text-sm text-foreground">No Projects Found</p>
            <p class="text-xs mt-1">There are currently no active projects assigned to your account.</p>
          </div>
        `;
      }
      return `
        <div class="space-y-3">
          ${filtered.map(p => {
            const c = statusConfig[p.status];
            
            // Link project files dynamically
            const files = getProjectFiles(p.id);
            const invoices = getInvoices();
            const projectInvoices = invoices.filter(inv => {
              return inv.company === p.client && (
                (p.name.includes("Tax") && inv.description.includes("Tax")) ||
                (p.name.includes("Payroll") && inv.description.includes("Payroll")) ||
                (p.name.includes("VAT") && inv.description.includes("VAT")) ||
                (p.name.includes("Bookkeeping") && inv.description.includes("Bookkeeping")) ||
                (p.name.includes("Review") && inv.description.includes("Consulting"))
              );
            });

            return `
              <div class="bg-card border border-border rounded-xl p-5 space-y-4">
                <div class="flex items-start justify-between">
                  <div class="flex items-center gap-2">
                    <i data-lucide="folder-open" class="w-4.5 h-4.5 text-primary"></i>
                    <h3 class="font-bold text-sm text-foreground">${p.name}</h3>
                  </div>
                  <span class="flex items-center gap-1 text-[11px] font-medium px-2.5 py-0.5 rounded-full ${c.color}">
                     <i data-lucide="${c.icon}" class="w-3 h-3"></i> ${c.label}
                  </span>
                </div>
                
                <div class="space-y-2">
                  <div class="text-xs text-muted-foreground">Deadline: <strong class="text-foreground">${p.deadline}</strong></div>
                  
                  <div class="space-y-1">
                    <div class="w-full bg-muted rounded-full h-1.5">
                      <div class="bg-primary h-1.5 rounded-full" style="width:${p.progress}%"></div>
                    </div>
                    <div class="text-[10px] text-muted-foreground text-right">${p.progress}% complete</div>
                  </div>
                </div>

                <!-- Merged Invoices & Documents List -->
                <div class="pt-3 border-t border-border/80 space-y-2">
                  <div class="text-xs font-bold text-foreground flex items-center gap-1">
                    <i data-lucide="files" class="w-3.5 h-3.5 text-primary"></i>
                    <span>Associated Invoices & Documents</span>
                  </div>
                  
                  <div class="space-y-1 bg-muted/30 p-2.5 rounded-lg border border-border/50">
                    ${projectInvoices.length === 0 && files.length === 0 ? `
                      <p class="text-[11px] text-muted-foreground">No documents uploaded yet.</p>
                    ` : ''}

                    ${projectInvoices.map(inv => `
                      <div class="flex items-center justify-between text-xs py-1 border-b border-border/30 last:border-0">
                        <div class="flex items-center gap-1.5 text-muted-foreground truncate mr-2">
                          <i data-lucide="file-text" class="w-3.5 h-3.5 text-primary shrink-0"></i>
                          <span class="truncate">Invoice_${inv.id}.pdf (${inv.status==='paid'?'Paid':'Unpaid'})</span>
                        </div>
                        <button onclick="downloadInvoicePDF('${inv.id}')" class="text-primary hover:underline font-semibold text-[11px] flex items-center gap-0.5 shrink-0">
                          <i data-lucide="download" class="w-3 h-3"></i> Download
                        </button>
                      </div>
                    `).join("")}

                    ${files.map(f => `
                      <div class="flex items-center justify-between text-xs py-1 border-b border-border/30 last:border-0">
                        <div class="flex items-center gap-1.5 text-muted-foreground truncate mr-2">
                          <i data-lucide="file" class="w-3.5 h-3.5 text-success shrink-0"></i>
                          <span class="truncate">${f.name.replace(/\.[^/.]+$/, "") + ".pdf"}</span>
                        </div>
                        <button onclick="downloadProjectFilePDF('${f.id}')" class="text-primary hover:underline font-semibold text-[11px] flex items-center gap-0.5 shrink-0">
                          <i data-lucide="download" class="w-3 h-3"></i> Download
                        </button>
                      </div>
                    `).join("")}
                  </div>
                </div>


              </div>`;
          }).join("")}
        </div>
      `;
    }



    const content = `
      <div class="px-6 py-6 max-w-5xl mx-auto space-y-6">
        <div>
          <h2 class="font-heading text-2xl font-bold text-foreground">Projects</h2>
          <p class="text-muted-foreground text-sm mt-1">Track progress on ongoing tasks and milestones.</p>
        </div>
        <div id="filter-bar" class="flex gap-2 overflow-x-auto pb-2">
          ${["all","in_progress","pending","completed"].map((f,i)=>`
            <button data-filter="${f}" class="filter-btn px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap ${i===0?'bg-foreground text-background':'bg-muted text-muted-foreground'}">
              ${f==="all"?"All":f.replace("_"," ").replace(/\b\w/g, c => c.toUpperCase())}
            </button>`).join("")}
        </div>
        <div id="project-list">${render("all")}</div>
        
        <div class="bg-card border border-border rounded-xl p-5 space-y-4">
          <div class="flex items-center justify-between border-b border-border pb-3">
            <div class="flex items-center gap-2">
              <i data-lucide="message-circle" class="w-5 h-5 text-primary"></i>
              <h3 class="font-heading font-bold text-lg">Chat with KBR</h3>
            </div>
          </div>
          
          <div>
            <label class="text-xs font-semibold text-muted-foreground block mb-1.5">Select Project / Employee</label>
            <select id="chat-target" class="w-full border border-border rounded-lg px-3 py-2 bg-background text-sm focus:outline-none focus:ring-2 focus:ring-primary/50">
              ${projects.map(p => `
                <option value="${p.assignee}" data-project="${p.name}">
                  ${p.name} (Assigned: ${p.assignee})
                </option>
              `).join("")}
            </select>
          </div>

          <div class="bg-muted rounded-lg p-4">
            <div id="chat-header-name" class="text-xs font-semibold text-primary mb-1">Chatting with: Sipho Ndlovu</div>
            <p class="text-sm">Hi! I am working on your project. Type your message below and click send to chat with me on WhatsApp.</p>
          </div>

          <div class="flex gap-2">
            <input type="text" id="chat-message" placeholder="Type a message..." class="flex-1 border border-border rounded-lg px-4 py-2 text-sm bg-background focus:outline-none focus:ring-2 focus:ring-primary/50" />
            <button id="send-chat-btn" class="bg-primary text-primary-foreground hover:opacity-90 active:scale-95 px-4 py-2 rounded-lg text-sm font-semibold transition-all duration-150 flex items-center justify-center">
              <i data-lucide="send" class="w-4 h-4"></i>
            </button>
          </div>
        </div>
      </div>
    `;
    renderAppLayout({ title: "Projects", current: "client-projects.html", contentHTML: content, session });

    document.querySelectorAll(".filter-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".filter-btn").forEach(b => {
          b.className = "filter-btn px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap bg-muted text-muted-foreground";
        });
        btn.className = "filter-btn px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap bg-foreground text-background";
        document.getElementById("project-list").innerHTML = render(btn.dataset.filter);
        lucide.createIcons();
      });
    });

    // Chat target change and send handlers
    const chatTarget = document.getElementById("chat-target");
    if (chatTarget) {
      // Set initial state
      const initialAssignee = chatTarget.value;
      const headerName = document.getElementById("chat-header-name");
      if (headerName) headerName.innerText = `Chatting with: ${initialAssignee}`;

      chatTarget.addEventListener("change", () => {
        const assignee = chatTarget.value;
        const header = document.getElementById("chat-header-name");
        if (header) header.innerText = `Chatting with: ${assignee}`;
      });
    }

    const sendBtn = document.getElementById("send-chat-btn");
    const chatMsgInput = document.getElementById("chat-message");
    
    function sendWhatsAppMessage() {
      const assigneeSelect = document.getElementById("chat-target");
      if (!assigneeSelect) return;
      const assignee = assigneeSelect.value;
      const message = chatMsgInput.value.trim();
      if (!message) return alert("Please type a message first.");
      
      const phoneLookup = {
        "Kabelo Rammutla": "27812345678",
        "Thandi Mokoena": "27723456789",
        "Sipho Ndlovu": "27834567890",
        "Lindiwe Dlamini": "27845678901",
        "David van der Merwe": "27766789012",
        "Nomsa Khumalo": "27827890123"
      };
      
      const phone = phoneLookup[assignee] || "27834567890";
      const encodedMsg = encodeURIComponent(message);
      const whatsappUrl = `https://wa.me/${phone}?text=${encodedMsg}`;
      
      window.open(whatsappUrl, '_blank');
      chatMsgInput.value = '';
    }

    if (sendBtn && chatMsgInput) {
      sendBtn.addEventListener("click", sendWhatsAppMessage);
      chatMsgInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          sendWhatsAppMessage();
        }
      });
    }

    // PDF generation helpers for projects & invoices
    let cachedLogoImage = null;
    function loadLogoImage() {
      if (cachedLogoImage) return Promise.resolve(cachedLogoImage);
      return new Promise((resolve) => {
        const img = new Image();
        img.src = "../assets/logo.png";
        img.onload = () => {
          cachedLogoImage = img;
          resolve(img);
        };
        img.onerror = () => {
          resolve(null);
        };
      });
    }

    function drawVectorLogo(doc, x, y) {
      // Background primary circle
      doc.setFillColor(224, 26, 95); // Crimson `#e01a5f`
      doc.circle(x + 8, y + 8, 8, 'F');
      
      // "KBR" letter overlay
      doc.setTextColor(255, 255, 255);
      doc.setFont("helvetica", "bold");
      doc.setFontSize(8);
      doc.text("KBR", x + 5, y + 10.5);
      
      // Right side text logo
      doc.setTextColor(34, 31, 32); // Charcoal `#221f20`
      doc.setFont("helvetica", "bold");
      doc.setFontSize(14);
      doc.text("KBR", x + 20, y + 7);
      
      doc.setFont("helvetica", "normal");
      doc.setFontSize(8);
      doc.setTextColor(120, 120, 120);
      doc.text("BUSINESS SOLUTIONS", x + 20, y + 11);
    }

    function drawInvoicePage(doc, invoice, logoImg) {
      const startX = 14;
      let currentY = 18;

      // Draw Logo
      if (logoImg) {
        try {
          doc.addImage(logoImg, 'PNG', startX, currentY, 35, 14);
        } catch (e) {
          drawVectorLogo(doc, startX, currentY);
        }
      } else {
        drawVectorLogo(doc, startX, currentY);
      }

      // Title & Document Ref (Right side)
      doc.setTextColor(224, 26, 95); // Crimson
      doc.setFont("helvetica", "bold");
      doc.setFontSize(22);
      doc.text("INVOICE", 196, currentY + 4, { align: "right" });

      doc.setTextColor(80, 80, 80);
      doc.setFont("helvetica", "normal");
      doc.setFontSize(9);
      doc.text(`Invoice ID: ${invoice.id}`, 196, currentY + 10, { align: "right" });
      doc.text(`Due Date: ${invoice.due}`, 196, currentY + 15, { align: "right" });

      // Divider Line
      currentY = 38;
      doc.setDrawColor(220, 220, 220);
      doc.setLineWidth(0.5);
      doc.line(startX, currentY, 196, currentY);

      // Billing Information
      currentY = 48;
      doc.setFont("helvetica", "bold");
      doc.setFontSize(9);
      doc.setTextColor(120, 120, 120);
      doc.text("FROM:", startX, currentY);
      doc.text("BILLED TO:", 110, currentY);

      currentY += 6;
      doc.setFont("helvetica", "bold");
      doc.setFontSize(11);
      doc.setTextColor(34, 31, 32); // Charcoal
      doc.text("KBR Business Solutions (Pty) Ltd", startX, currentY);
      doc.text(invoice.company, 110, currentY);

      currentY += 5;
      doc.setFont("helvetica", "normal");
      doc.setFontSize(9);
      doc.setTextColor(80, 80, 80);
      doc.text("128 Rivonia Road, Sandton", startX, currentY);
      doc.text("Client Business Account", 110, currentY);

      currentY += 4.5;
      doc.text("Johannesburg, 2196", startX, currentY);
      doc.text("South Africa", 110, currentY);

      currentY += 4.5;
      doc.text("info@kbr.co.za | +27 11 482 9012", startX, currentY);

      // Status Pill
      currentY += 10;
      doc.setFont("helvetica", "bold");
      doc.setFontSize(9);
      if (invoice.status === "paid") {
        doc.setFillColor(220, 245, 225); // light green
        doc.rect(startX, currentY, 28, 6, 'F');
        doc.setTextColor(30, 140, 60); // dark green
        doc.text("PAID", startX + 14, currentY + 4.5, { align: "center" });
      } else {
        doc.setFillColor(255, 240, 210); // light orange
        doc.rect(startX, currentY, 28, 6, 'F');
        doc.setTextColor(200, 120, 10); // dark orange
        doc.text("UNPAID", startX + 14, currentY + 4.5, { align: "center" });
      }

      // Items Table
      currentY += 14;
      doc.setFillColor(245, 245, 245);
      doc.rect(startX, currentY, 182, 8, 'F');

      doc.setFont("helvetica", "bold");
      doc.setFontSize(9);
      doc.setTextColor(34, 31, 32);
      doc.text("Description", startX + 4, currentY + 5.5);
      doc.text("Amount (ZAR)", 192, currentY + 5.5, { align: "right" });

      currentY += 8;
      doc.setFont("helvetica", "normal");
      doc.setFontSize(10);
      doc.setTextColor(60, 60, 60);
      doc.text(invoice.description, startX + 4, currentY + 7);
      doc.text(`R${invoice.amount.toLocaleString()}`, 192, currentY + 7, { align: "right" });

      // Line Under Table
      currentY += 12;
      doc.setDrawColor(240, 240, 240);
      doc.line(startX, currentY, 196, currentY);

      // Totals (aligned right)
      currentY += 10;
      doc.setFont("helvetica", "normal");
      doc.setFontSize(9);
      doc.setTextColor(120, 120, 120);
      doc.text("Subtotal:", 135, currentY);
      doc.setTextColor(60, 60, 60);
      doc.text(`R${invoice.amount.toLocaleString()}`, 192, currentY, { align: "right" });

      currentY += 5;
      doc.setTextColor(120, 120, 120);
      doc.text("VAT (15% Included):", 135, currentY);
      doc.setTextColor(60, 60, 60);
      doc.text("R0.00", 192, currentY, { align: "right" });

      currentY += 6;
      doc.setDrawColor(200, 200, 200);
      doc.line(135, currentY, 196, currentY);

      currentY += 6;
      doc.setFont("helvetica", "bold");
      doc.setFontSize(12);
      doc.setTextColor(224, 26, 95); // Crimson
      doc.text("Total Amount:", 135, currentY);
      doc.text(`R${invoice.amount.toLocaleString()}`, 192, currentY, { align: "right" });

      // Payment Method Info (aligned left)
      let payY = currentY - 17;
      doc.setFont("helvetica", "bold");
      doc.setFontSize(9);
      doc.setTextColor(120, 120, 120);
      doc.text("PAYMENT INFORMATION", startX, payY);

      doc.setFont("helvetica", "normal");
      doc.setFontSize(8.5);
      doc.setTextColor(80, 80, 80);
      if (invoice.status === "paid") {
        doc.text(`Payment Method: ${invoice.paymentMethod || 'Secure Bank EFT'}`, startX, payY + 5);
        doc.text(`Payment Date: ${invoice.paidDate}`, startX, payY + 9);
      } else {
        doc.text("Bank Transfer (EFT) Details:", startX, payY + 5);
        doc.text("Bank: First National Bank (FNB)", startX, payY + 8.5);
        doc.text("Account Number: 62891234567 | Branch: 250655", startX, payY + 12);
      }

      // Footer
      const footerY = 270;
      doc.setDrawColor(230, 230, 230);
      doc.setLineWidth(0.5);
      doc.line(startX, footerY, 196, footerY);

      doc.setFont("helvetica", "italic");
      doc.setFontSize(8);
      doc.setTextColor(150, 150, 150);
      doc.text("Thank you for your business! This is an official secure document.", 105, footerY + 6, { align: "center" });

      const hash = btoa(invoice.id + invoice.amount + invoice.status).slice(0, 32);
      doc.setFont("courier", "normal");
      doc.setFontSize(7.5);
      doc.text(`Security Verification Hash: SHA-256 [${hash}]`, 105, footerY + 10, { align: "center" });
    }

    window.downloadInvoicePDF = function(invoiceId) {
      const invoice = getInvoiceById(invoiceId);
      if (!invoice) {
        alert("Invoice not found.");
        return;
      }
      
      loadLogoImage().then((logoImg) => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({
          orientation: "portrait",
          unit: "mm",
          format: "a4"
        });
        
        drawInvoicePage(doc, invoice, logoImg);
        doc.save(`${invoice.id}.pdf`);
      });
    };

    window.downloadProjectFilePDF = function(fileId) {
      initBillingStore();
      const allFiles = JSON.parse(localStorage.getItem("kbr_project_files")) || DEFAULT_PROJECT_FILES;
      const file = allFiles.find(f => f.id === fileId);
      if (!file) {
        alert("Project file not found.");
        return;
      }

      loadLogoImage().then((logoImg) => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({
          orientation: "portrait",
          unit: "mm",
          format: "a4"
        });

        const startX = 14;
        let currentY = 18;

        // Draw Logo
        if (logoImg) {
          try {
            doc.addImage(logoImg, 'PNG', startX, currentY, 35, 14);
          } catch (e) {
            drawVectorLogo(doc, startX, currentY);
          }
        } else {
          drawVectorLogo(doc, startX, currentY);
        }

        // Title & Document Ref (Right side)
        doc.setTextColor(224, 26, 95); // Crimson
        doc.setFont("helvetica", "bold");
        doc.setFontSize(22);
        doc.text("PROJECT DOCUMENT", 196, currentY + 4, { align: "right" });

        doc.setTextColor(80, 80, 80);
        doc.setFont("helvetica", "normal");
        doc.setFontSize(9);
        doc.text(`Document Ref: ${file.id}`, 196, currentY + 10, { align: "right" });
        doc.text(`Downloaded: ${new Date().toLocaleDateString()}`, 196, currentY + 15, { align: "right" });

        // Divider Line
        currentY = 38;
        doc.setDrawColor(220, 220, 220);
        doc.setLineWidth(0.5);
        doc.line(startX, currentY, 196, currentY);

        // Document Details
        currentY = 48;
        doc.setFont("helvetica", "bold");
        doc.setFontSize(10);
        doc.setTextColor(120, 120, 120);
        doc.text("DOCUMENT NAME:", startX, currentY);
        
        currentY += 6;
        doc.setFont("helvetica", "bold");
        doc.setFontSize(12);
        doc.setTextColor(34, 31, 32);
        const displayName = file.name.replace(/\.[^/.]+$/, "") + ".pdf";
        doc.text(displayName, startX, currentY);

        currentY += 10;
        doc.setFont("helvetica", "bold");
        doc.setFontSize(10);
        doc.setTextColor(120, 120, 120);
        doc.text("CONTENT:", startX, currentY);

        currentY += 8;
        doc.setFont("helvetica", "normal");
        doc.setFontSize(10);
        doc.setTextColor(60, 60, 60);

        // Wrap text
        const splitText = doc.splitTextToSize(file.content, 182);
        doc.text(splitText, startX, currentY);

        // Footer
        const footerY = 270;
        doc.setDrawColor(230, 230, 230);
        doc.setLineWidth(0.5);
        doc.line(startX, footerY, 196, footerY);

        doc.setFont("helvetica", "italic");
        doc.setFontSize(8);
        doc.setTextColor(150, 150, 150);
        doc.text("Thank you for using KBR Business Solutions portal. This is an official PDF document.", 105, footerY + 6, { align: "center" });

        const hash = btoa(file.id + file.name).slice(0, 32);
        doc.setFont("courier", "normal");
        doc.setFontSize(7.5);
        doc.text(`Security Verification Hash: SHA-256 [${hash}]`, 105, footerY + 10, { align: "center" });

        doc.save(displayName);
      });
    };

    window.addEventListener("storage", () => {
      const activeFilterBtn = document.querySelector(".filter-btn.bg-foreground");
      const activeFilter = activeFilterBtn ? activeFilterBtn.dataset.filter : "all";
      document.getElementById("project-list").innerHTML = render(activeFilter);
      lucide.createIcons();
    });
  }
</script>
</body>
</html>
