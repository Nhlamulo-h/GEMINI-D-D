<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Training — KBR</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/tailwind-config.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/billing-store.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/dark-mode.js"></script>
  <script src="../js/scroll-to-top.js"></script>
</head>
<body class="transition-colors">
<script>
  const session = requireAuth(["admin","client"]);
  if (session) {
    let currentTab = "browse"; // 'browse' or 'history'

    // Initialize courses data in localStorage if it doesn't exist
    const DEFAULT_COURSES = [
      {
        level: "Beginner", type: "Video", rating: "4.8", title: "Invoicing Administration", desc: "Master invoicing workflows, from creation to reconciliation.", time: "3h 20m", price: "R850",
        modules: ["Introduction to Invoicing", "Creating Invoices", "Tracking & Reconciliation"],
        more: "+1 more..",
        videoUrl: "https://www.w3schools.com/html/mov_bbb.mp4",
        bookUrl: "https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf"
      },
      {
        level: "Intermediate", type: "Video", rating: "4.9", title: "QuickBooks for Clients", desc: "Navigate QuickBooks like a pro. Reports, reconciliation, and more.", time: "5h 10m", price: "R920",
        modules: ["Getting Started"],
        more: "+3 more..",
        videoUrl: "https://www.w3schools.com/html/mov_bbb.mp4",
        bookUrl: "https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf"
      },
      {
        level: "Intermediate", type: "Video", rating: "4.6", title: "Payroll Management Essentials", desc: "Learn to process payroll, pensions, and SARS submissions.", time: "4h 00m", price: "R1,190",
        modules: ["Payroll Setup", "PAYE & UIF", "Payslips"],
        more: "+1 more..",
        videoUrl: "https://www.w3schools.com/html/mov_bbb.mp4",
        bookUrl: "https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf"
      },
      {
        level: "Advanced", type: "Book", rating: "4.8", title: "Financial Reporting for SMEs", desc: "Build professional management reports for small businesses.", time: "3h 50m", price: "R1,020",
        modules: ["Chapter 1: Introduction", "Chapter 2: Balance Sheets", "Chapter 3: Income Statements"],
        more: "+2 more..",
        videoUrl: "https://www.w3schools.com/html/mov_bbb.mp4",
        bookUrl: "https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf"
      }
    ];

    let courses = JSON.parse(localStorage.getItem('kbr_courses'));
    if (!courses || courses.length === 0) {
      courses = DEFAULT_COURSES;
      localStorage.setItem('kbr_courses', JSON.stringify(courses));
    }

    function renderCourses() {
      const activeCourses = JSON.parse(localStorage.getItem('kbr_courses')) || DEFAULT_COURSES;
      const isAdmin = session.role === 'admin';

      return activeCourses.map((c, index) => {
        const isUnlocked = isCoursePurchased(c.title);
        const inCart = getCart().find(item => item.title === c.title);

        return `
          <div class="bg-card border border-border rounded-xl p-6 transition-all shadow-sm hover:shadow-md relative overflow-hidden text-left">
            ${isUnlocked && !isAdmin ? `
              <div class="absolute top-0 right-0 bg-success text-success-foreground text-[10px] font-bold px-3 py-1 rounded-bl-lg uppercase tracking-wider flex items-center gap-1 z-10">
                <i data-lucide="unlock" class="w-3.5 h-3.5"></i> Unlocked
              </div>
            ` : ''}

            <div class="flex items-start justify-between mb-4">
              <div class="flex items-center gap-2">
                <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-semibold border border-border text-foreground">${c.level}</span>
                <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold border border-border text-foreground">
                  <i data-lucide="${c.type === 'Video' ? 'play' : 'book'}" class="w-3.5 h-3.5"></i> ${c.type}
                </span>
              </div>
              <div class="flex items-center gap-1 text-sm font-semibold text-foreground ${isUnlocked && !isAdmin ? 'mr-16' : ''}">
                <i data-lucide="star" class="w-4 h-4 text-yellow-400 fill-yellow-400"></i> ${c.rating}
              </div>
            </div>
            
            <h3 class="font-heading text-xl font-bold text-foreground mb-1">${c.title}</h3>
            <p class="text-muted-foreground text-sm mb-4">${c.desc}</p>
            
            <div class="flex items-center gap-2 text-muted-foreground text-sm mb-4">
              <i data-lucide="clock" class="w-4 h-4"></i> ${c.time}
            </div>
            
            <div class="space-y-2.5 mb-6">
              ${c.modules.map(m => `
                <div class="flex items-center gap-2 text-sm text-muted-foreground">
                  <i data-lucide="${(isUnlocked || isAdmin) ? 'play-circle' : 'lock'}" class="w-3.5 h-3.5 text-primary"></i> ${m}
                </div>
              `).join('')}
              <div class="text-xs text-muted-foreground/80 mt-1.5">${c.more}</div>
            </div>
            
            <div class="pt-6 border-t border-border flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
              <div class="font-heading text-xl font-bold text-foreground">
                ${(isUnlocked && !isAdmin) ? '<span class="text-success text-sm font-bold">Purchased</span>' : c.price}
              </div>
              <div class="flex items-center gap-3 w-full sm:w-auto justify-end">
                ${isAdmin ? `
                  <!-- Admin Actions: No Cart or pay options -->
                  <button onclick="handlePreview(${index})" class="px-4 py-2.5 rounded-lg border border-border text-xs font-bold hover:bg-secondary transition-all shrink-0 text-foreground">
                    Preview
                  </button>
                  <button onclick="handleDeleteCourse(${index})" class="px-4 py-2.5 rounded-lg border border-destructive text-destructive hover:bg-destructive/15 text-xs font-bold transition-all shrink-0">
                    Delete
                  </button>
                ` : `
                  <!-- Client Actions -->
                  ${isUnlocked ? `
                    <button onclick="handlePreview(${index})" class="flex-1 sm:flex-none px-6 py-2.5 rounded-lg bg-primary text-primary-foreground text-sm font-semibold hover:bg-primary/90 transition-colors flex items-center justify-center gap-1.5">
                      <i data-lucide="play" class="w-4 h-4"></i> Enter Course
                    </button>
                  ` : `
                    ${inCart ? `
                      <div class="flex items-center gap-2 w-full sm:w-auto">
                        <button class="px-4 py-2.5 rounded-lg bg-muted text-muted-foreground text-xs font-semibold cursor-not-allowed flex items-center gap-1.5" disabled>
                          <i data-lucide="check" class="w-4 h-4 text-success"></i> In Cart
                        </button>
                        <a href="checkout.html" class="px-4 py-2.5 rounded-lg bg-primary text-primary-foreground hover:opacity-90 active:scale-95 text-xs font-bold transition-all flex items-center justify-center gap-1.5 shadow-lg shadow-primary/20 shrink-0">
                          Checkout <i data-lucide="arrow-right" class="w-3.5 h-3.5"></i>
                        </a>
                      </div>
                    ` : `
                      <button onclick="handlePayNow('${index}', '${c.title}', '${c.price}')" class="flex-1 sm:flex-none flex justify-center items-center gap-1.5 px-4 py-2.5 rounded-lg bg-primary text-primary-foreground text-xs font-bold hover:opacity-95 active:scale-95 transition-all shadow-md shadow-primary/25 shrink-0">
                        <i data-lucide="credit-card" class="w-3.5 h-3.5"></i>
                        <span>Pay Now</span>
                      </button>
                      <button onclick="handleAddToCart('${index}', '${c.title}', '${c.price}')" class="flex-1 sm:flex-none flex justify-center items-center gap-1.5 px-4 py-2.5 rounded-lg border border-border text-xs font-semibold transition-all hover:bg-secondary active:scale-95 shrink-0">
                        <i data-lucide="shopping-cart" class="w-3.5 h-3.5 text-primary"></i>
                        <span>Add to Cart</span>
                      </button>
                    `}
                    <button onclick="handlePreview(${index})" class="flex-1 sm:flex-none px-4 py-2.5 rounded-lg border border-border text-xs font-semibold hover:bg-secondary transition-all shrink-0 text-foreground">
                      Preview
                    </button>
                  `}
                `}
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderEnrolledHistory() {
      const activeCourses = JSON.parse(localStorage.getItem('kbr_courses')) || DEFAULT_COURSES;
      const purchased = activeCourses.filter(c => isCoursePurchased(c.title));
      
      if (purchased.length === 0) {
        return `
          <div class="bg-card border border-border rounded-xl p-8 text-center text-muted-foreground">
            <i data-lucide="graduation-cap" class="w-10 h-10 mx-auto mb-2 opacity-50 text-muted-foreground"></i>
            <p class="font-bold text-sm text-foreground">No Enrolled Courses Yet</p>
            <p class="text-xs mt-1">Enroll in your first professional development course to see your purchase history here.</p>
          </div>
        `;
      }

      return purchased.map((c, i) => `
        <div class="bg-card border border-border rounded-xl p-5 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 transition-all hover:shadow-sm">
          <div class="text-left">
            <div class="flex items-center gap-2 mb-1.5">
              <span class="px-2 py-0.5 rounded-full bg-success/15 text-success text-[10px] font-bold uppercase tracking-wider flex items-center gap-1">
                <span class="w-1.5 h-1.5 rounded-full bg-success animate-pulse"></span> Paid & Unlocked
              </span>
              <span class="text-xs text-muted-foreground">${c.level} • ${c.time}</span>
            </div>
            <h3 class="font-bold text-md text-foreground font-heading">${c.title}</h3>
            <p class="text-xs text-muted-foreground mt-0.5">${c.desc}</p>
          </div>
          <div class="flex items-center gap-4 shrink-0 w-full sm:w-auto justify-between sm:justify-end">
            <div class="text-left sm:text-right text-xs">
              <span class="text-muted-foreground block text-[10px]">Access Status</span>
              <span class="font-bold text-success">Lifetime Active</span>
            </div>
            <button onclick="handleEnterCourseWorkspace('${c.title}')" class="px-4 py-2 bg-primary text-primary-foreground hover:opacity-90 active:scale-95 text-xs font-bold rounded-lg transition-all flex items-center gap-1 shrink-0">
              <i data-lucide="play" class="w-3.5 h-3.5 fill-current"></i> Enter Workspace
            </button>
          </div>
        </div>
      `).join('<div class="h-2"></div>');
    }

    window.handleEnterCourseWorkspace = function(title) {
      alert(`Welcome to your paid course workspace for '${title}'! Loading course resources...`);
    };

    window.handleDeleteCourse = function(index) {
      showConfirmModal("Are you sure you want to delete this course?", () => {
        const activeCourses = JSON.parse(localStorage.getItem('kbr_courses')) || DEFAULT_COURSES;
        activeCourses.splice(index, 1);
        localStorage.setItem('kbr_courses', JSON.stringify(activeCourses));
        alert("Course deleted successfully!");
        window.location.reload();
      });
    };

    const content = `
      <div class="px-6 py-6 max-w-5xl mx-auto space-y-6">
        <div>
          <h2 class="font-heading text-2xl font-bold text-foreground">${session.role === 'admin' ? 'Courses' : 'Training & Courses'}</h2>
          <p class="text-muted-foreground text-sm mt-1">${session.role === 'admin' ? 'Manage and update training courses for clients.' : 'Professional development courses — videos & books to level up your skills.'}</p>
        </div>

        ${session.role === "admin" ? `
        <!-- Admin Add Course Section -->
        <div class="bg-card border border-border rounded-xl p-5 space-y-4">
          <div class="flex items-center justify-between">
            <h3 class="font-heading font-bold text-lg text-foreground">Add Course</h3>
            <button id="toggle-course-btn" class="text-xs text-primary hover:underline font-semibold">Show Form</button>
          </div>
          
          <div id="add-course-form" class="hidden space-y-4 pt-2 border-t border-border/40">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="text-xs font-semibold text-muted-foreground block mb-1">Course Title</label>
                <input type="text" id="course-title" placeholder="e.g. Tax & VAT Advanced" class="w-full border border-border bg-background rounded-lg px-3 py-2 text-sm focus:ring-1 focus:ring-primary focus:outline-none text-foreground" />
              </div>
              <div>
                <label class="text-xs font-semibold text-muted-foreground block mb-1">Description</label>
                <input type="text" id="course-desc" placeholder="e.g. Deep dive into corporate tax returns..." class="w-full border border-border bg-background rounded-lg px-3 py-2 text-sm focus:ring-1 focus:ring-primary focus:outline-none text-foreground" />
              </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
              <div>
                <label class="text-xs font-semibold text-muted-foreground block mb-1">Level</label>
                <select id="course-level" class="w-full border border-border bg-background rounded-lg px-3 py-2 text-sm focus:ring-1 focus:ring-primary focus:outline-none text-foreground">
                  <option value="Beginner">Beginner</option>
                  <option value="Intermediate">Intermediate</option>
                  <option value="Advanced">Advanced</option>
                </select>
              </div>
              <div>
                <label class="text-xs font-semibold text-muted-foreground block mb-1">Format Type</label>
                <input type="text" id="course-format" value="Book" readonly class="w-full border border-border bg-muted rounded-lg px-3 py-2 text-sm text-muted-foreground focus:outline-none cursor-not-allowed" />
              </div>
              <div>
                <label class="text-xs font-semibold text-muted-foreground block mb-1">Price</label>
                <div class="relative rounded-lg shadow-sm">
                  <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
                    <span class="text-muted-foreground text-sm font-semibold">R</span>
                  </div>
                  <input type="text" id="course-price" placeholder="e.g. 950" class="w-full border border-border bg-background rounded-lg pl-8 pr-3 py-2 text-sm focus:ring-1 focus:ring-primary focus:outline-none text-foreground" />
                </div>
              </div>
              <div>
                <label class="text-xs font-semibold text-muted-foreground block mb-1">Star Rating</label>
                <select id="course-rating" class="w-full border border-border bg-background rounded-lg px-3 py-2 text-sm focus:ring-1 focus:ring-primary focus:outline-none text-foreground">
                  <option value="5.0">⭐ 5.0</option>
                  <option value="4.9">⭐ 4.9</option>
                  <option value="4.8">⭐ 4.8</option>
                  <option value="4.7">⭐ 4.7</option>
                  <option value="4.6">⭐ 4.6</option>
                  <option value="4.5">⭐ 4.5</option>
                </select>
              </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
              <div>
                <label class="text-xs font-semibold text-muted-foreground block mb-1">Duration / Time Estimate</label>
                <input type="text" id="course-time" placeholder="e.g. 4h 30m" class="w-full border border-border bg-background rounded-lg px-3 py-2 text-sm focus:ring-1 focus:ring-primary focus:outline-none text-foreground" />
              </div>
              <div>
                <label class="text-xs font-semibold text-muted-foreground block mb-1">Modules (Comma separated)</label>
                <input type="text" id="course-modules" placeholder="e.g. Introduction, Intermediate, Reconciliations" class="w-full border border-border bg-background rounded-lg px-3 py-2 text-sm focus:ring-1 focus:ring-primary focus:outline-none text-foreground" />
              </div>
              <div>
                <label class="text-xs font-semibold text-muted-foreground block mb-1">Book URL / Link</label>
                <input type="text" id="course-book-link" placeholder="e.g. https://example.com/book.pdf" class="w-full border border-border bg-background rounded-lg px-3 py-2 text-sm focus:ring-1 focus:ring-primary focus:outline-none text-foreground" />
              </div>
            </div>

            <div class="flex justify-end gap-2 pt-1">
              <button id="cancel-course-btn" class="border border-border text-xs px-4 py-2 rounded-lg font-medium hover:bg-muted text-foreground">Cancel</button>
              <button id="save-course-btn" class="bg-primary hover:opacity-90 text-primary-foreground text-xs px-4 py-2 rounded-lg font-semibold shadow-sm transition-all">Create & Add Course</button>
            </div>
          </div>
        </div>
        ` : ""}

        <!-- Custom Navigation Tabs -->
        <div class="flex gap-2 border-b border-border pb-px">
          <button id="tab-browse" class="tab-btn px-4 py-2 border-b-2 border-transparent text-sm font-medium transition-colors">
            All Courses (${courses.length})
          </button>
          ${session.role === 'client' ? `
          <button id="tab-history" class="tab-btn px-4 py-2 border-b-2 border-transparent text-sm font-medium transition-colors">
            My Enrolled Courses (History)
          </button>
          ` : ''}
        </div>

        <div id="courses-container" class="space-y-6">
          ${renderCourses()}
        </div>
      </div>
      
      <!-- Video / eBook Course Preview Modal -->
      <div id="preview-modal" class="fixed inset-0 bg-foreground/50 flex items-center justify-center z-50 hidden p-4 backdrop-blur-sm">
        <div class="bg-white dark:bg-card border border-border w-full max-w-3xl rounded-2xl overflow-hidden shadow-2xl flex flex-col max-h-[90vh] transition-colors relative">
          <!-- Modal Header -->
          <div class="p-4 border-b border-border flex items-center justify-between">
            <div>
              <span id="modal-level" class="text-[10px] uppercase font-bold tracking-wider text-primary bg-primary/10 px-2 py-0.5 rounded-full">Level</span>
              <h3 id="modal-title" class="font-heading font-bold text-lg text-foreground mt-1">Course Title</h3>
            </div>
            <button id="close-modal-btn" class="p-1.5 rounded-lg hover:bg-muted text-muted-foreground hover:text-foreground transition-colors">
              <i data-lucide="x" class="w-5 h-5"></i>
            </button>
          </div>
          
          <!-- Modal Body -->
          <div class="flex-1 overflow-y-auto p-6 flex flex-col md:flex-row gap-6">
            <!-- Left Pane: Media Player -->
            <div class="flex-1 space-y-4">
              <!-- Video Player Tag -->
              <div id="modal-video-container" class="aspect-video bg-slate-950 rounded-xl overflow-hidden relative flex flex-col items-center justify-center shadow-inner">
                <video id="modal-video-player" controls class="w-full h-full rounded-xl" src=""></video>
              </div>
              
              <!-- Ebook Reader Mock -->
              <div id="modal-book-container" class="hidden aspect-[4/5] bg-[#FDFBF7] dark:bg-card border-2 border-amber-900/10 rounded-xl p-6 shadow-inner text-gray-800 dark:text-gray-200 overflow-y-auto space-y-4">
                <div class="border-b border-amber-900/10 pb-2 text-center">
                  <span class="text-[9px] uppercase tracking-widest text-amber-900/60 block">Chapter 1 Preview</span>
                  <h4 class="font-heading font-bold text-sm text-amber-900 dark:text-primary" id="modal-book-title">Introduction</h4>
                </div>
                <p class="text-xs leading-relaxed italic text-muted-foreground text-center">"The journey of building a financially healthy enterprise begins with tracking every Rand..."</p>
                <p class="text-xs leading-relaxed">Financial reports are not just tax compliance requirements. They represent the primary health indicators of your business. Standard reports include Balance Sheets, Income Statements, and Cash Flow Statements. By analyzing the trends, you can predict cash constraints in advance.</p>
                
                <!-- eBook preview PDF Download Link -->
                <div class="py-2 text-center bg-amber-50 dark:bg-amber-900/10 rounded-lg border border-dashed border-amber-900/20" id="modal-book-link-container">
                  <a id="modal-book-link" href="#" target="_blank" class="text-primary hover:underline text-xs font-bold flex items-center justify-center gap-1.5">
                    <i data-lucide="book-open" class="w-4 h-4"></i> Open Full eBook (PDF)
                  </a>
                </div>
                
                <div class="py-2.5 text-center bg-muted rounded-lg border border-dashed border-border flex items-center justify-center gap-1.5 text-xs text-muted-foreground font-semibold" id="modal-book-locked-msg">
                  <i data-lucide="lock" class="w-4 h-4 text-primary"></i> Purchase course to view full book
                </div>

                <div class="pt-4 border-t border-amber-900/10 text-center flex items-center justify-between text-[10px] text-muted-foreground">
                  <button class="hover:text-primary font-semibold" onclick="alert('First page preview.')"><i data-lucide="chevron-left" class="w-4 h-4 inline"></i> Prev Page</button>
                  <span>Page 1 of 5</span>
                  <button class="hover:text-primary font-semibold" onclick="alert('Full access unlocked upon purchase.')">Next Page <i data-lucide="chevron-right" class="w-4 h-4 inline"></i></button>
                </div>
              </div>

              <!-- Course Meta Info - Cart actions removed entirely -->
              <div class="flex justify-between items-center bg-muted/40 p-4 rounded-xl border border-border">
                <div>
                  <span class="text-[10px] text-muted-foreground block">Estimated Duration</span>
                  <span id="modal-duration" class="font-heading font-bold text-sm text-foreground">3h 20m</span>
                </div>
                <div>
                  <span class="text-[10px] text-muted-foreground block text-right font-medium">Full Course Preview</span>
                  <span class="text-xs text-primary font-bold">Free Sample Mode</span>
                </div>
              </div>
            </div>
            
            <!-- Right Pane: Course Modules / Curriculum -->
            <div class="w-full md:w-64 space-y-4 text-left">
              <div class="text-xs font-bold text-foreground">Course Curriculum</div>
              <div id="modal-curriculum" class="space-y-2">
                <!-- Modules generated here -->
              </div>
            </div>
          </div>
        </div>
      </div>
    `;
    
    renderAppLayout({ title: session.role === "admin" ? "Courses" : "Training", current: "training.html", contentHTML: content, session });

    window.handleAddToCart = function(index, title, price) {
      const added = addToCart(index, title, price);
      if (added) {
        alert(`Course '${title}' has been added to your cart.`);
        if (window.refreshCartUI) window.refreshCartUI();
        
        // Reload cards to update button states
        document.getElementById("courses-container").innerHTML = renderCourses();
        lucide.createIcons();
      }
    };

    window.handlePayNow = function(index, title, price) {
      addToCart(index, title, price);
      window.location.href = "checkout.html";
    };

    window.handlePreview = function(index) {
      const activeCourses = JSON.parse(localStorage.getItem('kbr_courses')) || DEFAULT_COURSES;
      const course = activeCourses[index];
      const modal = document.getElementById("preview-modal");
      const isAdmin = session.role === 'admin';
      const isUnlocked = isCoursePurchased(course.title);
      
      document.getElementById("modal-level").innerText = course.level;
      document.getElementById("modal-title").innerText = course.title;
      document.getElementById("modal-duration").innerText = course.time;
      
      const videoContainer = document.getElementById("modal-video-container");
      const videoPlayer = document.getElementById("modal-video-player");
      const bookContainer = document.getElementById("modal-book-container");
      const bookLink = document.getElementById("modal-book-link");
      
      if (course.type === "Video") {
        videoContainer.classList.remove("hidden");
        bookContainer.classList.add("hidden");
        if (videoPlayer) {
          videoPlayer.src = course.videoUrl || "https://www.w3schools.com/html/mov_bbb.mp4";
        }
      } else {
        videoContainer.classList.add("hidden");
        bookContainer.classList.remove("hidden");
        if (videoPlayer) videoPlayer.src = "";
        document.getElementById("modal-book-title").innerText = course.title;
        
        const bookLinkContainer = document.getElementById("modal-book-link-container");
        const lockedMsg = document.getElementById("modal-book-locked-msg");
        if (isUnlocked || isAdmin) {
          if (bookLinkContainer) bookLinkContainer.classList.remove("hidden");
          if (lockedMsg) lockedMsg.classList.add("hidden");
          if (bookLink) {
            bookLink.href = course.bookUrl || "https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf";
          }
        } else {
          if (bookLinkContainer) bookLinkContainer.classList.add("hidden");
          if (lockedMsg) lockedMsg.classList.remove("hidden");
        }
      }
      
      const curriculumContainer = document.getElementById("modal-curriculum");
      curriculumContainer.innerHTML = course.modules.map((mod, i) => `
        <div class="p-2.5 bg-muted/40 rounded-lg border border-border flex items-center justify-between text-xs text-left">
          <div class="flex items-center gap-2 truncate">
            <span class="w-5 h-5 rounded-full bg-muted text-muted-foreground flex items-center justify-center font-bold text-[9px] shrink-0">${i+1}</span>
            <span class="truncate font-medium text-foreground">${mod}</span>
          </div>
          <i data-lucide="${(isUnlocked || isAdmin) ? 'play-circle' : 'lock'}" class="w-3.5 h-3.5 ${(isUnlocked || isAdmin) ? 'text-success' : 'text-muted-foreground'} shrink-0"></i>
        </div>
      `).join("");
      
      modal.classList.remove("hidden");
      lucide.createIcons();
    };

    document.getElementById("close-modal-btn").onclick = () => {
      document.getElementById("preview-modal").classList.add("hidden");
      const videoPlayer = document.getElementById("modal-video-player");
      if (videoPlayer) videoPlayer.pause();
    };

    // ============================================
    // PREMIUM GLASSMORPHIC FLOATING CART & CHECKOUT BAR
    // ============================================
    if (session.role === "client") {
      const cartBarContainer = document.createElement("div");
      cartBarContainer.id = "floating-cart-bar";
      cartBarContainer.className = "fixed bottom-6 left-1/2 -translate-x-1/2 z-40 w-[calc(100%-2rem)] max-w-2xl bg-white/85 dark:bg-card/85 backdrop-blur-lg border border-border shadow-2xl rounded-2xl p-4 flex flex-col sm:flex-row items-center justify-between gap-4 transition-all duration-500 transform translate-y-32 opacity-0 hidden";
      
      cartBarContainer.innerHTML = `
        <div class="flex items-center gap-3.5">
          <div class="w-10 h-10 rounded-xl bg-primary/10 text-primary flex items-center justify-center shrink-0">
            <i data-lucide="shopping-bag" class="w-5 h-5"></i>
          </div>
          <div>
            <div class="font-bold text-sm text-foreground" id="float-cart-count">0 Courses in Cart</div>
            <div class="text-xs text-muted-foreground flex items-center gap-1.5 mt-0.5">Subtotal: <strong class="text-primary font-bold text-sm" id="float-cart-subtotal">R0.00</strong></div>
          </div>
        </div>
        <div class="hidden md:flex flex-wrap items-center gap-1.5 max-w-xs overflow-x-auto py-1" id="float-cart-items-badges">
          <!-- Course badges -->
        </div>
        <div class="flex items-center gap-3 w-full sm:w-auto shrink-0 justify-end">
          <button id="float-cart-clear-btn" class="text-xs font-semibold text-muted-foreground hover:text-destructive transition-colors px-2 py-1.5">
            Clear
          </button>
          <a href="checkout.html" class="flex-1 sm:flex-none bg-primary text-primary-foreground hover:opacity-90 active:scale-95 text-center px-5 py-2.5 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-1.5 shadow-lg shadow-primary/20">
            Proceed to Checkout <i data-lucide="arrow-right" class="w-4 h-4"></i>
          </a>
        </div>
      `;
      
      document.body.appendChild(cartBarContainer);
      
      document.getElementById("float-cart-clear-btn").onclick = () => {
        clearCart();
        if (window.refreshCartUI) window.refreshCartUI();
        updateTabDisplay();
      };
      
      const originalRefreshCart = window.refreshCartUI;
      window.refreshCartUI = function() {
        if (originalRefreshCart) originalRefreshCart();
        
        const cart = getCart();
        const bar = document.getElementById("floating-cart-bar");
        const countEl = document.getElementById("float-cart-count");
        const subtotalEl = document.getElementById("float-cart-subtotal");
        const badgesEl = document.getElementById("float-cart-items-badges");
        
        if (!bar) return;
        
        if (cart.length > 0) {
          bar.classList.remove("hidden");
          setTimeout(() => {
            bar.classList.remove("translate-y-32", "opacity-0");
          }, 50);
          
          if (countEl) countEl.innerText = `${cart.length} Course${cart.length > 1 ? 's' : ''} in Cart`;
          
          let total = 0;
          const badgeHTML = cart.map(item => {
            const priceVal = Number(item.price.replace(/[^\d]/g, ""));
            total += priceVal;
            return `<span class="inline-block bg-primary/10 text-primary border border-primary/20 text-[9px] font-bold px-2 py-0.5 rounded-full truncate max-w-[90px]">${item.title}</span>`;
          }).join("");
          
          if (subtotalEl) subtotalEl.innerText = `R${total.toLocaleString()}`;
          if (badgesEl) badgesEl.innerHTML = badgeHTML;
        } else {
          bar.classList.add("translate-y-32", "opacity-0");
          setTimeout(() => {
            bar.classList.add("hidden");
          }, 500);
        }
        lucide.createIcons();
      };
      
      window.refreshCartUI();
    }

    // ============================================
    // DYNAMIC TABS DISPLAY & ACTIONS
    // ============================================
    function updateTabDisplay() {
      const browseBtn = document.getElementById("tab-browse");
      const historyBtn = document.getElementById("tab-history");
      const container = document.getElementById("courses-container");
      
      if (!browseBtn || !container) return;

      if (currentTab === "browse") {
        browseBtn.className = "tab-btn px-4 py-2 border-b-2 border-primary text-sm font-semibold text-primary transition-colors bg-primary/5 rounded-t-lg";
        if (historyBtn) {
          historyBtn.className = "tab-btn px-4 py-2 border-b-2 border-transparent text-sm font-medium text-muted-foreground hover:text-foreground transition-colors";
        }
        container.innerHTML = renderCourses();
      } else {
        browseBtn.className = "tab-btn px-4 py-2 border-b-2 border-transparent text-sm font-medium text-muted-foreground hover:text-foreground transition-colors";
        if (historyBtn) {
          historyBtn.className = "tab-btn px-4 py-2 border-b-2 border-primary text-sm font-semibold text-primary transition-colors bg-primary/5 rounded-t-lg";
        }
        container.innerHTML = renderEnrolledHistory();
      }
      lucide.createIcons();
    }

    // Bind tab clicks
    const tabBrowseBtn = document.getElementById("tab-browse");
    const tabHistoryBtn = document.getElementById("tab-history");
    if (tabBrowseBtn) {
      tabBrowseBtn.onclick = () => { currentTab = "browse"; updateTabDisplay(); };
    }
    if (tabHistoryBtn) {
      tabHistoryBtn.onclick = () => { currentTab = "history"; updateTabDisplay(); };
    }

    // Initial render
    updateTabDisplay();

    // ============================================
    // ADMIN COURSE CREATOR EVENT BINDINGS
    // ============================================
    if (session.role === "admin") {
      const toggleCourseBtn = document.getElementById("toggle-course-btn");
      const courseForm = document.getElementById("add-course-form");
      const cancelCourseBtn = document.getElementById("cancel-course-btn");
      const saveCourseBtn = document.getElementById("save-course-btn");

      if (toggleCourseBtn && courseForm) {
        toggleCourseBtn.onclick = () => {
          const isHidden = courseForm.classList.contains("hidden");
          if (isHidden) {
            courseForm.classList.remove("hidden");
            toggleCourseBtn.innerText = "Hide Form";
          } else {
            courseForm.classList.add("hidden");
            toggleCourseBtn.innerText = "Show Form";
          }
        };
      }

      if (cancelCourseBtn && courseForm && toggleCourseBtn) {
        cancelCourseBtn.onclick = () => {
          courseForm.classList.add("hidden");
          toggleCourseBtn.innerText = "Show Form";
          document.getElementById("course-title").value = "";
          document.getElementById("course-desc").value = "";
          document.getElementById("course-price").value = "";
          document.getElementById("course-time").value = "";
          document.getElementById("course-modules").value = "";
          document.getElementById("course-book-link").value = "";
        };
      }

      if (saveCourseBtn && courseForm && toggleCourseBtn) {
        saveCourseBtn.onclick = () => {
          const title = document.getElementById("course-title").value.trim();
          const desc = document.getElementById("course-desc").value.trim();
          const level = document.getElementById("course-level").value;
          const format = document.getElementById("course-format").value;
          let priceInput = document.getElementById("course-price").value.trim();
          const rating = document.getElementById("course-rating").value;
          const time = document.getElementById("course-time").value.trim();
          const modulesInput = document.getElementById("course-modules").value.trim();
          const bookLinkVal = document.getElementById("course-book-link").value.trim();

          if (!title || !desc || !priceInput || !time || !modulesInput || !bookLinkVal) {
            return alert("Please fill in all course parameters including the Book URL.");
          }

          if (priceInput.startsWith("R")) {
            priceInput = priceInput.substring(1).trim();
          }
          const numericPrice = parseFloat(priceInput.replace(/,/g, ''));
          const formattedPrice = isNaN(numericPrice) ? ("R" + priceInput) : ("R" + numericPrice.toLocaleString());

          const modulesArray = modulesInput.split(",").map(m => m.trim()).filter(m => m.length > 0);
          if (modulesArray.length === 0) {
            return alert("Please provide at least one module name.");
          }

          const activeCourses = JSON.parse(localStorage.getItem('kbr_courses')) || DEFAULT_COURSES;
          
          const newCourse = {
            level: level,
            type: format,
            rating: rating,
            title: title,
            desc: desc,
            time: time,
            price: formattedPrice,
            modules: modulesArray.slice(0, 3),
            more: modulesArray.length > 3 ? `+${modulesArray.length - 3} more..` : "",
            videoUrl: "",
            bookUrl: bookLinkVal
          };

          activeCourses.unshift(newCourse);
          localStorage.setItem('kbr_courses', JSON.stringify(activeCourses));

          alert("Training course successfully added!");
          window.location.reload();
        };
      }
    }

    // Celebration Toast for client post-purchase
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get("purchased") === "true" && session.role === "client") {
      currentTab = "history";
      updateTabDisplay();

      const toast = document.createElement("div");
      toast.className = "fixed top-6 left-1/2 -translate-x-1/2 z-50 bg-emerald-500 text-white rounded-2xl shadow-2xl p-4 flex items-center gap-3.5 max-w-md border border-emerald-400 transition-all duration-500 transform -translate-y-32 opacity-0";
      toast.innerHTML = `
        <div class="w-10 h-10 rounded-xl bg-white/20 flex items-center justify-center text-white shrink-0 shadow-inner animate-bounce">
          <i data-lucide="party-popper" class="w-5 h-5"></i>
        </div>
        <div class="flex-1">
          <div class="font-bold text-sm">Purchase Successful!</div>
          <p class="text-[11px] opacity-90 leading-tight mt-0.5">Your premium course modules have been successfully unlocked. Click 'Enter Workspace' below to start learning!</p>
        </div>
        <button onclick="this.parentElement.remove()" class="text-white hover:opacity-85 text-xs font-bold px-1.5"><i data-lucide="x" class="w-4 h-4"></i></button>
      `;
      
      document.body.appendChild(toast);
      window.history.replaceState({}, document.title, window.location.pathname);
      
      setTimeout(() => {
        toast.classList.remove("-translate-y-32", "opacity-0");
        lucide.createIcons();
      }, 100);
      
      setTimeout(() => {
        if (toast) {
          toast.classList.add("-translate-y-32", "opacity-0");
          setTimeout(() => toast.remove(), 500);
        }
      }, 6000);
    }
  }
</script>
</body>
</html>
