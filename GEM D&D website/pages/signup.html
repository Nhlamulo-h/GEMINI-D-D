<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Registration — KBR</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/tailwind-config.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/dark-mode.js"></script>
  <script src="../js/scroll-to-top.js"></script>
</head>
<body class="bg-gray-50 dark:bg-hero text-foreground dark:text-hero-foreground font-body min-h-screen flex flex-col items-center justify-center px-6 transition-colors relative">
  <!-- Theme Toggle -->
  <button id="theme-toggle" type="button" class="absolute top-6 right-6 p-2 rounded-lg text-gray-500 hover:bg-gray-200 dark:text-gray-400 dark:hover:bg-gray-800 focus:outline-none transition-colors" aria-label="Toggle Dark Mode">
  </button>
  <div class="w-full max-w-md py-12">
    <div class="text-center mb-8">
      <div class="flex justify-center mb-4">
        <img src="../assets/logo.png" alt="KBR Logo" class="h-16 w-auto object-contain drop-shadow-md dark:hidden">
        <img src="../assets/logo2.png" alt="KBR Logo" class="h-16 w-auto object-contain drop-shadow-md hidden dark:block">
      </div>
      <h1 class="font-heading text-3xl font-bold text-foreground dark:text-hero-foreground">Create Account</h1>
      <p class="text-muted-foreground dark:text-hero-foreground/60 text-sm mt-2">Join KBR Business Solutions</p>
    </div>

    <div class="bg-white dark:bg-card border border-gray-100 dark:border-gray-800 rounded-xl p-8 shadow-xl transition-colors">
      <form id="signup-form" class="space-y-4">
        <div>
          <label class="text-foreground/80 dark:text-hero-foreground/80 text-xs font-semibold mb-1 block">Full Name</label>
          <input type="text" name="fullName" required placeholder="John Smith" class="w-full bg-white dark:bg-background/10 border border-gray-300 dark:border-hero-foreground/20 text-foreground dark:text-hero-foreground placeholder-gray-400 dark:placeholder-hero-foreground/40 rounded-md px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" />
        </div>
        <div>
          <label class="text-foreground/80 dark:text-hero-foreground/80 text-xs font-semibold mb-1 block">Email</label>
          <input type="email" name="email" required placeholder="you@company.co.za" class="w-full bg-white dark:bg-background/10 border border-gray-300 dark:border-hero-foreground/20 text-foreground dark:text-hero-foreground placeholder-gray-400 dark:placeholder-hero-foreground/40 rounded-md px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" />
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="text-foreground/80 dark:text-hero-foreground/80 text-xs font-semibold mb-1 block">Phone</label>
            <input type="tel" name="phone" placeholder="+27 ..." class="w-full bg-white dark:bg-background/10 border border-gray-300 dark:border-hero-foreground/20 text-foreground dark:text-hero-foreground placeholder-gray-400 dark:placeholder-hero-foreground/40 rounded-md px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" />
          </div>
          <div>
            <label class="text-foreground/80 dark:text-hero-foreground/80 text-xs font-semibold mb-1 block">Company</label>
            <input type="text" name="company" placeholder="Company Name" class="w-full bg-white dark:bg-background/10 border border-gray-300 dark:border-hero-foreground/20 text-foreground dark:text-hero-foreground placeholder-gray-400 dark:placeholder-hero-foreground/40 rounded-md px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" />
          </div>
        </div>

        <div>
          <label class="text-foreground/80 dark:text-hero-foreground/80 text-xs font-semibold mb-1 block">VAT Number (optional)</label>
          <input type="text" name="vat" placeholder="4XXXXXXXXX" class="w-full bg-white dark:bg-background/10 border border-gray-300 dark:border-hero-foreground/20 text-foreground dark:text-hero-foreground placeholder-gray-400 dark:placeholder-hero-foreground/40 rounded-md px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" />
        </div>

        <div>
          <label class="text-foreground/80 dark:text-hero-foreground/80 text-xs font-semibold mb-1 block">Password</label>
          <div class="relative">
            <input type="password" name="password" required placeholder="Min 6 characters" class="w-full bg-white dark:bg-background/10 border border-gray-300 dark:border-hero-foreground/20 text-foreground dark:text-hero-foreground placeholder-gray-400 dark:placeholder-hero-foreground/40 rounded-md px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" />
            <button type="button" onclick="togglePasswordVisibility(this)" class="absolute inset-y-0 right-3 flex items-center text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 focus:outline-none">
              <i data-lucide="eye" class="w-4 h-4"></i>
            </button>
          </div>
        </div>

        <div>
          <label class="text-foreground/80 dark:text-hero-foreground/80 text-xs font-semibold mb-1 block">Confirm Password</label>
          <div class="relative">
            <input type="password" name="confirmPassword" required placeholder="Re-enter password" class="w-full bg-white dark:bg-background/10 border border-gray-300 dark:border-hero-foreground/20 text-foreground dark:text-hero-foreground placeholder-gray-400 dark:placeholder-hero-foreground/40 rounded-md px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" />
            <button type="button" onclick="togglePasswordVisibility(this)" class="absolute inset-y-0 right-3 flex items-center text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 focus:outline-none">
              <i data-lucide="eye" class="w-4 h-4"></i>
            </button>
          </div>
        </div>
        
        <div class="pt-2">
          <button type="submit" class="w-full bg-primary text-primary-foreground font-semibold py-3 rounded-md hover:bg-primary/90 transition-colors">Create Account</button>
        </div>
        
        <p class="text-center text-muted-foreground dark:text-hero-foreground/50 text-xs mt-4">
          Already have an account? <a href="login.html" class="text-primary font-semibold hover:underline">Sign In</a>
        </p>
      </form>
    </div>

    <a href="../index.html" class="block text-center text-muted-foreground/80 dark:text-hero-foreground/40 text-xs mt-8 hover:underline">← Back to Home</a>
  </div>

  <script>


    lucide.createIcons();

    document.getElementById("signup-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      
      const email = fd.get("email").trim();
      const password = fd.get("password");
      const confirmPassword = fd.get("confirmPassword");
      const fullName = fd.get("fullName").trim();
      const phone = fd.get("phone").trim();
      const company = fd.get("company").trim();
      const vat = fd.get("vat").trim();

      if (password.length < 6) {
        return alert("Password must be at least 6 characters long.");
      }

      if (password !== confirmPassword) {
        return alert("Passwords do not match.");
      }

      try {
        await registerUser(email, password, {
          name: fullName,
          phone: phone,
          company: company,
          vat: vat,
          role: "client" // Default role for new signups
        });

        alert("Account created successfully! Please sign in.");
        window.location.href = "login.html";
      } catch (error) {
        console.error("Registration error:", error);
        alert(error.message || "Failed to create account. Please try again.");
      }
    });

    window.togglePasswordVisibility = function(btn) {
      const input = btn.previousElementSibling;
      const icon = btn.querySelector('i');
      if (input.type === "password") {
        input.type = "text";
        icon.setAttribute("data-lucide", "eye-off");
      } else {
        input.type = "password";
        icon.setAttribute("data-lucide", "eye");
      }
      if (typeof lucide !== 'undefined') lucide.createIcons();
    };
  </script>
</body>
</html>
