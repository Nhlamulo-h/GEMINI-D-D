<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Billing — KBR</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/tailwind-config.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/billing-store.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/dark-mode.js"></script>
  <script src="../js/scroll-to-top.js"></script>
  <!-- Load jsPDF from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="transition-colors">
<script>
  const session = requireAuth(["client"]);
  if (session) {
    initBillingStore();
    
    let currentTab = "current";
    function fmt(n){return n.toLocaleString();}

    function renderInvoices(list) {
      if (list.length === 0) {
        return `
          <div class="py-8 text-center text-muted-foreground">
            <i data-lucide="file-text" class="w-10 h-10 mx-auto mb-2 opacity-50 text-muted-foreground"></i>
            <p class="font-bold text-sm text-foreground">No Invoices Found</p>
            <p class="text-xs mt-1">There are no invoices in this category.</p>
          </div>
        `;
      }
      return list.map(inv => `
        <div class="pt-4 first:pt-0">
          <div class="flex items-start justify-between">
            <div>
              <div class="font-bold">${inv.id}</div>
              <div class="text-sm text-muted-foreground">${inv.company}</div>
              <div class="text-xs text-muted-foreground mt-1">${inv.description}</div>
            </div>
            <div class="text-right">
              <div class="font-bold">R${fmt(inv.amount)}</div>
              <div class="text-xs text-muted-foreground">${inv.status==='paid'?'Paid: '+inv.paidDate:'Due: '+inv.due}</div>
            </div>
          </div>
          <div class="flex items-center gap-2 mt-3">
            <span class="text-xs font-bold px-3 py-1 rounded-full ${inv.status==='paid'?'bg-success/10 text-success':'bg-warning/10 text-warning'}">
              ${inv.status==='paid'?'Paid':'Unpaid'}
            </span>
            <button onclick="downloadInvoicePDF('${inv.id}')" class="flex items-center gap-1 text-xs text-muted-foreground hover:text-foreground px-2 py-1">
              <i data-lucide="file-text" class="w-3.5 h-3.5 text-primary"></i> Download PDF
            </button>
            ${(inv.status==='unpaid')?`
              <a href="checkout.html?invoiceId=${inv.id}" class="bg-primary text-primary-foreground rounded-md text-xs h-7 px-3 flex items-center justify-center gap-1 font-medium hover:opacity-90 transition-opacity">
                <i data-lucide="credit-card" class="w-3 h-3"></i> Pay Now
              </a>`:''}
          </div>
        </div>
      `).join('<div class="border-t border-border"></div>');
    }

    const content = `
      <div class="px-6 py-6 max-w-5xl mx-auto space-y-6">
        <div>
          <h2 class="font-heading text-2xl font-bold text-foreground">Billing</h2>
          <p class="text-muted-foreground text-sm mt-1">Manage invoices, payments, and financial records.</p>
        </div>
        <div class="grid grid-cols-1 gap-3">
          <div class="bg-card border border-border rounded-xl p-5">
            <div class="flex items-center gap-2 mb-1">
              <i data-lucide="alert-circle" class="w-4 h-4 text-warning"></i>
              <div class="text-sm text-muted-foreground">Outstanding Balance</div>
            </div>
            <div class="font-heading text-2xl font-bold" id="outstanding-balance-text">R0</div>
            <div class="text-sm text-muted-foreground" id="unpaid-count-text">0 unpaid invoices</div>
          </div>
          <div class="bg-card border border-border rounded-xl p-5">
            <div class="flex items-center gap-2 mb-1">
              <i data-lucide="check-circle" class="w-4 h-4 text-success"></i>
              <div class="text-sm text-muted-foreground">Total Paid (YTD)</div>
            </div>
            <div class="font-heading text-2xl font-bold" id="total-paid-text">R0</div>
            <div class="text-sm text-muted-foreground" id="paid-count-text">0 paid invoices</div>
          </div>
        </div>

        <div class="bg-card border border-border rounded-xl p-5">
          <div class="flex items-center justify-between mb-4">
            <h3 class="font-heading font-bold text-xl">Invoices</h3>
            <button onclick="exportAllInvoicesPDF()" class="flex items-center gap-1.5 border border-primary text-primary hover:bg-primary/5 rounded-lg px-3.5 py-2 text-sm font-semibold transition-all">
              <i data-lucide="download" class="w-4 h-4"></i> Export All (PDF)
            </button>
          </div>
          <div class="flex gap-2 mb-4">
            <button id="tab-current" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium">Current (0)</button>
            <button id="tab-history" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium">History (0)</button>
          </div>
          <div id="invoice-list" class="space-y-4"></div>
        </div>
      </div>
    `;
    renderAppLayout({ title: "Billing", current: "client-billing.html", contentHTML: content, session });

    function refreshBillingUI() {
      const allInvoices = getInvoices();
      const invoiceData = allInvoices.filter(i => i.company === session.name);
      
      const current = invoiceData.filter(i=>i.status==="unpaid");
      const history = invoiceData.filter(i=>i.status==="paid");
      const totalOut = current.reduce((s,i)=>s+i.amount,0);
      const totalPaid = history.reduce((s,i)=>s+i.amount,0);

      const outstandingEl = document.getElementById("outstanding-balance-text");
      const unpaidCountEl = document.getElementById("unpaid-count-text");
      const totalPaidEl = document.getElementById("total-paid-text");
      const paidCountEl = document.getElementById("paid-count-text");

      if (outstandingEl) outstandingEl.innerText = `R${fmt(totalOut)}`;
      if (unpaidCountEl) unpaidCountEl.innerText = `${current.length} unpaid invoice${current.length !== 1 ? 's' : ''}`;
      if (totalPaidEl) totalPaidEl.innerText = `R${fmt(totalPaid)}`;
      if (paidCountEl) paidCountEl.innerText = `${history.length} paid invoice${history.length !== 1 ? 's' : ''}`;

      const tabCurrent = document.getElementById("tab-current");
      const tabHistory = document.getElementById("tab-history");
      const invoiceList = document.getElementById("invoice-list");

      if (tabCurrent) {
        tabCurrent.innerText = `Current (${current.length})`;
        tabCurrent.className = "tab-btn px-4 py-2 rounded-lg text-sm font-medium font-semibold " + (currentTab === 'current' ? 'bg-foreground text-background' : 'bg-muted text-muted-foreground');
      }
      if (tabHistory) {
        tabHistory.innerText = `History (${history.length})`;
        tabHistory.className = "tab-btn px-4 py-2 rounded-lg text-sm font-medium font-semibold " + (currentTab === 'history' ? 'bg-foreground text-background' : 'bg-muted text-muted-foreground');
      }

      if (invoiceList) {
        invoiceList.innerHTML = renderInvoices(currentTab === 'current' ? current : history);
      }
      lucide.createIcons();
    }

    function setTab(which) {
      currentTab = which;
      refreshBillingUI();
    }
    document.getElementById("tab-current").onclick = ()=>setTab("current");
    document.getElementById("tab-history").onclick = ()=>setTab("history");

    refreshBillingUI();
    window.addEventListener("storage", refreshBillingUI);


    // Preload logo image for PDF rendering
    let cachedLogoImage = null;
    function loadLogoImage() {
      if (cachedLogoImage) return Promise.resolve(cachedLogoImage);
      return new Promise((resolve) => {
        const img = new Image();
        img.src = "../assets/logo.png";
        img.onload = () => {
          cachedLogoImage = img;
          resolve(img);
        };
        img.onerror = () => {
          resolve(null);
        };
      });
    }

    function drawVectorLogo(doc, x, y) {
      // Background primary circle
      doc.setFillColor(224, 26, 95); // Crimson `#e01a5f`
      doc.circle(x + 8, y + 8, 8, 'F');
      
      // "KBR" letter overlay
      doc.setTextColor(255, 255, 255);
      doc.setFont("helvetica", "bold");
      doc.setFontSize(8);
      doc.text("KBR", x + 5, y + 10.5);
      
      // Right side text logo
      doc.setTextColor(34, 31, 32); // Charcoal `#221f20`
      doc.setFont("helvetica", "bold");
      doc.setFontSize(14);
      doc.text("KBR", x + 20, y + 7);
      
      doc.setFont("helvetica", "normal");
      doc.setFontSize(8);
      doc.setTextColor(120, 120, 120);
      doc.text("BUSINESS SOLUTIONS", x + 20, y + 11);
    }

    function drawInvoicePage(doc, invoice, logoImg) {
      const startX = 14;
      let currentY = 18;

      // Draw Logo
      if (logoImg) {
        try {
          doc.addImage(logoImg, 'PNG', startX, currentY, 35, 14);
        } catch (e) {
          drawVectorLogo(doc, startX, currentY);
        }
      } else {
        drawVectorLogo(doc, startX, currentY);
      }

      // Title & Document Ref (Right side)
      doc.setTextColor(224, 26, 95); // Crimson
      doc.setFont("helvetica", "bold");
      doc.setFontSize(22);
      doc.text("INVOICE", 196, currentY + 4, { align: "right" });

      doc.setTextColor(80, 80, 80);
      doc.setFont("helvetica", "normal");
      doc.setFontSize(9);
      doc.text(`Invoice ID: ${invoice.id}`, 196, currentY + 10, { align: "right" });
      doc.text(`Due Date: ${invoice.due}`, 196, currentY + 15, { align: "right" });

      // Divider Line
      currentY = 38;
      doc.setDrawColor(220, 220, 220);
      doc.setLineWidth(0.5);
      doc.line(startX, currentY, 196, currentY);

      // Billing Information
      currentY = 48;
      doc.setFont("helvetica", "bold");
      doc.setFontSize(9);
      doc.setTextColor(120, 120, 120);
      doc.text("FROM:", startX, currentY);
      doc.text("BILLED TO:", 110, currentY);

      currentY += 6;
      doc.setFont("helvetica", "bold");
      doc.setFontSize(11);
      doc.setTextColor(34, 31, 32); // Charcoal
      doc.text("KBR Business Solutions (Pty) Ltd", startX, currentY);
      doc.text(invoice.company, 110, currentY);

      currentY += 5;
      doc.setFont("helvetica", "normal");
      doc.setFontSize(9);
      doc.setTextColor(80, 80, 80);
      doc.text("128 Rivonia Road, Sandton", startX, currentY);
      doc.text("Client Business Account", 110, currentY);

      currentY += 4.5;
      doc.text("Johannesburg, 2196", startX, currentY);
      doc.text("South Africa", 110, currentY);

      currentY += 4.5;
      doc.text("info@kbr.co.za | +27 11 482 9012", startX, currentY);

      // Status Pill
      currentY += 10;
      doc.setFont("helvetica", "bold");
      doc.setFontSize(9);
      if (invoice.status === "paid") {
        doc.setFillColor(220, 245, 225); // light green
        doc.rect(startX, currentY, 28, 6, 'F');
        doc.setTextColor(30, 140, 60); // dark green
        doc.text("PAID", startX + 14, currentY + 4.5, { align: "center" });
      } else {
        doc.setFillColor(255, 240, 210); // light orange
        doc.rect(startX, currentY, 28, 6, 'F');
        doc.setTextColor(200, 120, 10); // dark orange
        doc.text("UNPAID", startX + 14, currentY + 4.5, { align: "center" });
      }

      // Items Table
      currentY += 14;
      doc.setFillColor(245, 245, 245);
      doc.rect(startX, currentY, 182, 8, 'F');

      doc.setFont("helvetica", "bold");
      doc.setFontSize(9);
      doc.setTextColor(34, 31, 32);
      doc.text("Description", startX + 4, currentY + 5.5);
      doc.text("Amount (ZAR)", 192, currentY + 5.5, { align: "right" });

      currentY += 8;
      doc.setFont("helvetica", "normal");
      doc.setFontSize(10);
      doc.setTextColor(60, 60, 60);
      doc.text(invoice.description, startX + 4, currentY + 7);
      doc.text(`R${invoice.amount.toLocaleString()}`, 192, currentY + 7, { align: "right" });

      // Line Under Table
      currentY += 12;
      doc.setDrawColor(240, 240, 240);
      doc.line(startX, currentY, 196, currentY);

      // Totals (aligned right)
      currentY += 10;
      doc.setFont("helvetica", "normal");
      doc.setFontSize(9);
      doc.setTextColor(120, 120, 120);
      doc.text("Subtotal:", 135, currentY);
      doc.setTextColor(60, 60, 60);
      doc.text(`R${invoice.amount.toLocaleString()}`, 192, currentY, { align: "right" });

      currentY += 5;
      doc.setTextColor(120, 120, 120);
      doc.text("VAT (15% Included):", 135, currentY);
      doc.setTextColor(60, 60, 60);
      doc.text("R0.00", 192, currentY, { align: "right" });

      currentY += 6;
      doc.setDrawColor(200, 200, 200);
      doc.line(135, currentY, 196, currentY);

      currentY += 6;
      doc.setFont("helvetica", "bold");
      doc.setFontSize(12);
      doc.setTextColor(224, 26, 95); // Crimson
      doc.text("Total Amount:", 135, currentY);
      doc.text(`R${invoice.amount.toLocaleString()}`, 192, currentY, { align: "right" });

      // Payment Method Info (aligned left)
      let payY = currentY - 17;
      doc.setFont("helvetica", "bold");
      doc.setFontSize(9);
      doc.setTextColor(120, 120, 120);
      doc.text("PAYMENT INFORMATION", startX, payY);

      doc.setFont("helvetica", "normal");
      doc.setFontSize(8.5);
      doc.setTextColor(80, 80, 80);
      if (invoice.status === "paid") {
        doc.text(`Payment Method: ${invoice.paymentMethod || 'Secure Bank EFT'}`, startX, payY + 5);
        doc.text(`Payment Date: ${invoice.paidDate}`, startX, payY + 9);
      } else {
        doc.text("Bank Transfer (EFT) Details:", startX, payY + 5);
        doc.text("Bank: First National Bank (FNB)", startX, payY + 8.5);
        doc.text("Account Number: 62891234567 | Branch: 250655", startX, payY + 12);
      }

      // Footer
      const footerY = 270;
      doc.setDrawColor(230, 230, 230);
      doc.setLineWidth(0.5);
      doc.line(startX, footerY, 196, footerY);

      doc.setFont("helvetica", "italic");
      doc.setFontSize(8);
      doc.setTextColor(150, 150, 150);
      doc.text("Thank you for your business! This is an official secure document.", 105, footerY + 6, { align: "center" });

      const hash = btoa(invoice.id + invoice.amount + invoice.status).slice(0, 32);
      doc.setFont("courier", "normal");
      doc.setFontSize(7.5);
      doc.text(`Security Verification Hash: SHA-256 [${hash}]`, 105, footerY + 10, { align: "center" });
    }

    window.downloadInvoicePDF = function(invoiceId) {
      const invoice = getInvoiceById(invoiceId);
      if (!invoice) {
        alert("Invoice not found.");
        return;
      }
      
      loadLogoImage().then((logoImg) => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({
          orientation: "portrait",
          unit: "mm",
          format: "a4"
        });
        
        drawInvoicePage(doc, invoice, logoImg);
        doc.save(`${invoice.id}.pdf`);
      });
    };

    window.exportAllInvoicesPDF = function() {
      if (invoiceData.length === 0) {
        alert("No invoices available to export.");
        return;
      }

      loadLogoImage().then((logoImg) => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({
          orientation: "portrait",
          unit: "mm",
          format: "a4"
        });

        invoiceData.forEach((invoice, index) => {
          if (index > 0) {
            doc.addPage();
          }
          drawInvoicePage(doc, invoice, logoImg);
        });

        const safeCompanyName = session.name.replace(/[^a-zA-Z0-9]/g, "_");
        doc.save(`KBR_Invoices_${safeCompanyName}.pdf`);
      });
    };
  }
</script>
</body>
</html>
